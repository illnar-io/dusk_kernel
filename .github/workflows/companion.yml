name: Build Companion Module

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Upload Companion Module
        uses: actions/upload-artifact@v7
        with:
          name: dusk-companion
          path: companion/module/
          if-no-files-found: error
