name: Kernel Build Process
permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      kernel_version:
        required: true
        type: string
      root:
        required: false
        type: string
        default: KernelSU-Next
      susfs:
        required: false
        type: boolean
        default: true
      variant:
        required: false
        type: string
      use_repo:
        required: false
        type: boolean

jobs:
  build-gki:
    name: "${{ inputs.kernel_version }} (${{ inputs.variant }})"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Parse kernel version
      id: parse
      uses: ./.github/actions/parse-kernel-version
      with:
        kernel_version: ${{ inputs.kernel_version }}

    - name: Free Disk Space
      if: false
      uses: endersonmenezes/free-disk-space@v3
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
        remove_tool_cache: true
        remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
        rm_cmd: "rmz"
        rmz_version: "3.1.1"
        testing: false

    - name: Setup more Swap (for LTO)
      uses: thejerrybao/setup-swap-space@v1
      with:
        swap-size-gb: 16

    - name: Setup Build Environment
      uses: ./.github/actions/setup-build-environment
      env:
        BOOT_SIGN_KEY: ${{ secrets.BOOT_SIGN_KEY }}
          
    - name: Download Kernel Repository
      uses: ./.github/actions/download-kernel
      with:
        android_version: ${{ steps.parse.outputs.android_version }}
        kernel_version: ${{ steps.parse.outputs.kernel_version }}
        os_patch_level: ${{ steps.parse.outputs.os_patch_level }}
        use_repo: ${{ inputs.use_repo }}

    - name: Extract Sublevel and Set File Name
      id: extract
      uses: ./.github/actions/extract-sublevel-file-name
      with:
        variant: ${{ inputs.variant }}

    - name: Kernel Fixes
      uses: ./.github/actions/kernel-fixes
      with:
        android_version: ${{ steps.parse.outputs.android_version }}
        kernel_version: ${{ steps.parse.outputs.kernel_version }}
        sublevel: ${{ steps.extract.outputs.sublevel }}
        os_patch_level: ${{ steps.parse.outputs.os_patch_level }}

    - name: Setup Root Solution
      if: true
      uses: ./.github/actions/kernelsu
      with:
        root: ${{ inputs.root }}

    - name: SUSFS
      if: inputs.susfs
      uses: ./.github/actions/susfs
      with:
        android_version: ${{ steps.parse.outputs.android_version }}
        kernel_version: ${{ steps.parse.outputs.kernel_version }}
        os_patch_level: ${{ steps.parse.outputs.os_patch_level }}
        sublevel: ${{ steps.extract.outputs.sublevel }}

    - name: NTSYNC
      uses: ./.github/actions/ntsync
      with:
        kernel_version: ${{ steps.parse.outputs.kernel_version }}

    - name: Baseband Guard
      uses: ./.github/actions/bbg

    - name: Setup Networking
      uses: ./.github/actions/networking
      with:
        kernel_version: ${{ steps.parse.outputs.kernel_version }}
        android_version: ${{ steps.parse.outputs.android_version }}

    - name: DroidSpaces-OSS Patches
      uses: ./.github/actions/droidspaces
      with:
        kernel_version: ${{ steps.parse.outputs.kernel_version }}

    - name: Setup Misc Configs
      uses: ./.github/actions/misc
      with:
        kernel_version: ${{ steps.parse.outputs.kernel_version }}
        android_version: ${{ steps.parse.outputs.android_version }}

    - name: Phase 2 Patches
      uses: ./.github/actions/phase2-patches
      with:
        kernel_version: ${{ steps.parse.outputs.kernel_version }}
        android_version: ${{ steps.parse.outputs.android_version }}
        sublevel: ${{ steps.extract.outputs.sublevel }}

    - name: Duchamp Performance & Battery Patches
      uses: ./.github/actions/duchamp-patches
      with:
        kernel_version: ${{ steps.parse.outputs.kernel_version }}
        sublevel: ${{ steps.extract.outputs.sublevel }}

    - name: Apply Module Check Bypass
      if: ${{ inputs.variant == 'Bypass' }}
      uses: ./.github/actions/module-check-bypass
      with:
        kernel_version: ${{ steps.parse.outputs.kernel_version }}

    - name: Apply Device-Specific Patches
      uses: ./.github/actions/apply-device-patches
      with:
        kernel_version: ${{ steps.parse.outputs.kernel_version }}

    - name: Apply ABI Compare Bypass
      if: true
      working-directory: ${{ github.workspace }}/kernel
      run: |
        if [[ "$ANDROID_VERSION" == "android12" && "$KERNEL_VERSION" == "5.10" ]]; then
          sed -i 's/^\s*exit 1$/    echo "Who Cares? Bypassing Now!"/' build/abi/compare_to_symbol_list
        elif [[ "$ANDROID_VERSION" == "android13" && "$KERNEL_VERSION" == "5.10" ]]; then
          sed -i 's/^\s*exit 1$/    echo "Who Cares? Bypassing Now!"/' build/kernel/abi/compare_to_symbol_list
        elif [[ "$ANDROID_VERSION" == "android13" && "$KERNEL_VERSION" == "5.15" ]]; then
          sed -i 's/^\s*exit 1$/    echo "Who Cares? Bypassing Now!"/' build/kernel/abi/compare_to_symbol_list
        elif [[ "$ANDROID_VERSION" == "android14" && "$KERNEL_VERSION" == "5.15" ]]; then
          perl -i -pe 's/^(\s*)return 1$/$1print("Who Cares? Bypassing Now!")\n$1return 0/g if /if missing_symbols:/../return 1/' build/kernel/abi/check_buildtime_symbol_protection.py
        elif [[ "$ANDROID_VERSION" == "android14" && "$KERNEL_VERSION" == "6.1" ]]; then
          perl -i -pe 's/^(\s*)return 1$/$1print("Who Cares? Bypassing Now!")\n$1return 0/g if /if missing_symbols:/../return 1/' build/kernel/abi/check_buildtime_symbol_protection.py
        elif [[ "$ANDROID_VERSION" == "android15" && "$KERNEL_VERSION" == "6.6" ]]; then
          perl -i -pe 's/^(\s*)return 1$/$1print("Who Cares? Bypassing Now!")\n$1return 0/g if /if missing_symbols:/../return 1/' build/kernel/abi/check_buildtime_symbol_protection.py
        fi

    - name: Apply Kernel Branding
      uses: ./.github/actions/apply-kernel-branding
      with:
        variant: ${{ inputs.variant }}
        kernel_version: ${{ steps.parse.outputs.kernel_version }}
        android_version: ${{ steps.parse.outputs.android_version }}
        sublevel: ${{ steps.extract.outputs.sublevel }}

    - name: Remove Protected Exports
      uses: ./.github/actions/remove-protected-exports

    - name: Clean Kernel Flags
      uses: ./.github/actions/clean-kernel-flags

    - name: Replace KSU symlink with real files (Bazel compat)
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail
        DRIVER_DIR="drivers"
        test -d "common/drivers" && DRIVER_DIR="common/drivers"

        # ----------------------------------------------------------------
        # Step 1: Replace symlink with real files under drivers/kernelsu
        # ----------------------------------------------------------------
        if [ -L "$DRIVER_DIR/kernelsu" ]; then
          echo "→ Replacing $DRIVER_DIR/kernelsu symlink with real files..."
          rm -f "$DRIVER_DIR/kernelsu"
          cp -r "KernelSU-Next/kernel" "$DRIVER_DIR/kernelsu"
          rm -rf "$DRIVER_DIR/kernelsu/.git"
          if [ -L "$DRIVER_DIR/kernelsu/include/uapi" ]; then
            echo "→ Fixing include/uapi symlink..."
            rm -f "$DRIVER_DIR/kernelsu/include/uapi"
            cp -r "KernelSU-Next/uapi" "$DRIVER_DIR/kernelsu/include/uapi"
            rm -rf "$DRIVER_DIR/kernelsu/include/uapi/.git"
            echo "✓ include/uapi is now a real directory"
          fi
          echo "✓ $DRIVER_DIR/kernelsu is now a real directory"
        else
          echo "→ $DRIVER_DIR/kernelsu is not a symlink, skipping"
        fi

        # ----------------------------------------------------------------
        # Step 2: Copy KSU source to security/ksu/ and force obj-y.
        # security/selinux/ generates flask.h that KSU's selinux/selinux.c
        # needs (via include/objsec.h).  We add an explicit make dependency
        # so flask.h is generated *before* KSU is compiled — fixing the
        # build-ordering race from the init/ approach.
        # ----------------------------------------------------------------
        SEC_DIR="$DRIVER_DIR/../security"
        if [ -d "$SEC_DIR" ]; then
          echo "→ Copying KSU source to $SEC_DIR/ksu/ ..."
          rm -rf "$SEC_DIR/ksu"
          cp -r "$DRIVER_DIR/kernelsu" "$SEC_DIR/ksu"
          sed -i '/^obj-.*kernelsu\.o$/c\obj-y += kernelsu.o' "$SEC_DIR/ksu/Kbuild"
          echo "✓ Kbuild in security/ksu/ forced to obj-y"
          if ! grep -q "obj-y.*ksu" "$SEC_DIR/Makefile" 2>/dev/null; then
            echo "obj-y += ksu/" >> "$SEC_DIR/Makefile"
            echo "✓ Added obj-y += ksu/ to security/Makefile"
          fi
          # Add explicit dep: KSU's selinux/selinux.o needs generated flask.h
          # $(obj) in security/Makefile evaluates to security/
          echo '$(obj)/ksu/selinux/selinux.o: $(obj)/selinux/flask.h' >> "$SEC_DIR/Makefile"
          echo "✓ Added flask.h dependency for KSU selinux/selinux.o"
        else
          echo "⚠ security/ directory not found at $SEC_DIR"
        fi

    - name: Commit all kernel source modifications
      shell: bash
      run: |
        set -euo pipefail
        cd ${{ github.workspace }}/kernel
        git add -A
        git diff --cached --quiet && echo "Nothing to commit — tree is clean" || \
          git commit -m "feat: apply kernel modifications (KSU, SUSFS, patches)"
        echo "All kernel source changes committed to git index"

    - name: Verify KSU inline hooks
      shell: bash
      run: |
        set -euo pipefail
        cd ${{ github.workspace }}/kernel/common
        MISSING=0
        check_hook() {
          local file="$1"
          local pattern="$2"
          if grep -q "$pattern" "$file" 2>/dev/null; then
            echo "OK: $pattern found in $file"
          else
            echo "FATAL: Missing hook '$pattern' in $file"
            MISSING=$((MISSING + 1))
          fi
        }
        check_hook "fs/exec.c"             "ksu_handle_execveat("
        check_hook "fs/open.c"             "ksu_handle_faccessat("
        check_hook "fs/read_write.c"       "ksu_handle_sys_read("
        check_hook "fs/stat.c"             "ksu_handle_stat("
        check_hook "drivers/input/input.c" "ksu_handle_input_handle_event("
        check_hook "kernel/reboot.c"       "ksu_handle_sys_reboot("
        if [ "$MISSING" -gt 0 ]; then
          echo ""
          echo "ERROR: $MISSING KSU inline hook(s) missing from kernel source."
          echo "Kernel will silently fall back to Tracepoint mode."
          echo "This causes app crashes, broken root hiding, and ART instability."
          echo "Fix: ensure SUSFS 50_add patch applied correctly."
          exit 1
        fi
        echo "All KSU inline hooks verified."

    - name: Scan and collect patch rejects
      id: scan
      if: ${{ always() && inputs.variant == 'Normal' }}
      uses: ./.github/actions/scan-patch-rejects
        
    - name: Upload Rejects
      if: ${{ always() && inputs.variant == 'Normal' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.extract.outputs.file_name }}-Rejects
        path: patch-rejects/
        if-no-files-found: ignore
        compression-level: 9

    - name: 'Setup Cache and Build Environment'
      uses: ./.github/actions/cache-setup
      with:
        android_version: ${{ steps.parse.outputs.android_version }}
        kernel_version: ${{ steps.parse.outputs.kernel_version }}
        sublevel: ${{ steps.extract.outputs.sublevel }}

    - name: Restore build caches (ccache, bazel, bazel-disk, lto)
      id: restore-caches
      uses: ./.github/actions/cache-restore
      with:
        cache_paths: |
          /home/runner/.ccache
          /home/runner/.cache/bazel
          /home/runner/.ld_cache
        cache_keys: |
          buildcache-${{ inputs.kernel_version }}
          buildcache-${{ inputs.kernel_version }}
          buildcache-${{ inputs.kernel_version }}
        cache_buckets: |
          ccache-cache
          bazel-cache
          lto-cache
        compression_level: 9
        restore_keys: |
          buildcache-

    - name: Check cache hit
      run: |
        if [ "${{ steps.restore-caches.outputs.cache-hit }}" = "true" ]; then
          echo "✅ Cache HIT"
          IFS=',' read -ra KEYS <<< "${{ steps.restore-caches.outputs.cache-key }}"
          IFS=',' read -ra SIZES <<< "${{ steps.restore-caches.outputs.cache-size }}"
          
          for i in "${!KEYS[@]}"; do
            echo "   [${i}] ${KEYS[$i]} (${SIZES[$i]})"
          done
        else
          echo "❌ No caches found - Fresh build"
        fi

    - name: Get Cache Stats
      uses: ./.github/actions/cache-stats
      with:
        clear_stats: true

    - name: Build Kernel
      env:
        SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}
        KBUILD_BUILD_TIMESTAMP: ${{ env.KBUILD_BUILD_TIMESTAMP }}
      uses: ./.github/actions/build-kernel

    - name: Verify Kernel Config
      uses: ./.github/actions/verify-kernel-config
      with:
        kernel_version: ${{ steps.parse.outputs.kernel_version }}

    - name: Get Cache Stats
      uses: ./.github/actions/cache-stats
      with:
        clear_stats: false

    - name: Save build caches (ccache, bazel, bazel-disk, lto)
      continue-on-error: true
      uses: ./.github/actions/cache-save
      with:
        cache_paths: |
          /home/runner/.ccache
          /home/runner/.cache/bazel
          /home/runner/.ld_cache
        cache_keys: |
          buildcache-${{ inputs.kernel_version }}
          buildcache-${{ inputs.kernel_version }}
          buildcache-${{ inputs.kernel_version }}
        cache_buckets: |
          ccache-cache
          bazel-cache
          lto-cache
        compression_level: 9
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Bootimgs Folder and Build Boot Images
      uses: ./.github/actions/build-boot-images

    - name: Upload Boot Image (boot.img)
      uses: actions/upload-artifact@v7
      with:
        path: ${{ github.workspace }}/boot-artifacts/${{ steps.extract.outputs.file_name }}-boot.img
        if-no-files-found: error
        archive: false

    - name: Upload Boot Image (boot-gz.img)
      uses: actions/upload-artifact@v7
      with:
        path: ${{ github.workspace }}/boot-artifacts/${{ steps.extract.outputs.file_name }}-boot-gz.img
        if-no-files-found: error
        archive: false

    - name: Upload Boot Image (boot-lz4.img)
      uses: actions/upload-artifact@v7
      with:
        path: ${{ github.workspace }}/boot-artifacts/${{ steps.extract.outputs.file_name }}-boot-lz4.img
        if-no-files-found: error
        archive: false

    - name: Prepare AnyKernel3 Zip
      uses: ./.github/actions/prepare-anykernel3

    - name: Generate AnyKernel3 zip name
      id: zip_name
      shell: bash
      run: |
        case "${{ inputs.root }}" in
          KernelSU-Next) short=ksun ;;
          SukiSU-Ultra)  short=sukisu ;;
          ReSukiSU)      short=resukisu ;;
          *)             short="${{ inputs.root}}" ;;
        esac
        RUN_NUM=${{ github.run_number }}
        DATE=$(TZ=UTC date +%d_%m_%y)
        echo "zip_name=${{ steps.extract.outputs.file_name }}-AnyKernel3_${RUN_NUM}_dusk_${short}_${DATE}" >> "$GITHUB_OUTPUT"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.zip_name.outputs.zip_name }}
        path: ${{ github.workspace }}/AnyKernel3/**
        if-no-files-found: ignore
        compression-level: 9
