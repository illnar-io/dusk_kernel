name: Weekly Dependency Check

on:
  schedule:
    - cron: '0 6 * * 6'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check KernelSU-Next (dev branch)
        id: ksu
        run: |
          PINNED="30802e7260e2387176b9301377e88fc6fb0356b7"
          LATEST=$(git ls-remote https://github.com/KernelSU-Next/KernelSU-Next.git refs/heads/dev | awk '{print $1}')
          echo "pinned=$PINNED" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          [ "$PINNED" != "$LATEST" ] && [ -n "$LATEST" ] && echo "updated=true" >> $GITHUB_OUTPUT || echo "updated=false" >> $GITHUB_OUTPUT

      - name: Check SUSFS (android12-5.10)
        id: susfs_a12_5_10
        run: |
          PINNED="e2b0f05ccca5f8fdfc33991c036672235ce48f05"
          LATEST=$(git ls-remote https://gitlab.com/simonpunk/susfs4ksu.git refs/heads/gki-android12-5.10 | awk '{print $1}')
          echo "pinned=$PINNED" >> $GITHUB_OUTPUT; echo "latest=$LATEST" >> $GITHUB_OUTPUT
          [ "$PINNED" != "$LATEST" ] && [ -n "$LATEST" ] && echo "updated=true" >> $GITHUB_OUTPUT || echo "updated=false" >> $GITHUB_OUTPUT

      - name: Check SUSFS (android13-5.10)
        id: susfs_a13_5_10
        run: |
          PINNED="97234f8e35cdc3b8ea22d05c98ab9829f6421d67"
          LATEST=$(git ls-remote https://gitlab.com/simonpunk/susfs4ksu.git refs/heads/gki-android13-5.10 | awk '{print $1}')
          echo "pinned=$PINNED" >> $GITHUB_OUTPUT; echo "latest=$LATEST" >> $GITHUB_OUTPUT
          [ "$PINNED" != "$LATEST" ] && [ -n "$LATEST" ] && echo "updated=true" >> $GITHUB_OUTPUT || echo "updated=false" >> $GITHUB_OUTPUT

      - name: Check SUSFS (android13-5.15)
        id: susfs_a13_5_15
        run: |
          PINNED="bf9bf0091bcd4d0072d845ea62484f3011f8d5a8"
          LATEST=$(git ls-remote https://gitlab.com/simonpunk/susfs4ksu.git refs/heads/gki-android13-5.15 | awk '{print $1}')
          echo "pinned=$PINNED" >> $GITHUB_OUTPUT; echo "latest=$LATEST" >> $GITHUB_OUTPUT
          [ "$PINNED" != "$LATEST" ] && [ -n "$LATEST" ] && echo "updated=true" >> $GITHUB_OUTPUT || echo "updated=false" >> $GITHUB_OUTPUT

      - name: Check SUSFS (android14-5.15)
        id: susfs_a14_5_15
        run: |
          PINNED="667368cf274311a62971671035738b154be1c062"
          LATEST=$(git ls-remote https://gitlab.com/simonpunk/susfs4ksu.git refs/heads/gki-android14-5.15 | awk '{print $1}')
          echo "pinned=$PINNED" >> $GITHUB_OUTPUT; echo "latest=$LATEST" >> $GITHUB_OUTPUT
          [ "$PINNED" != "$LATEST" ] && [ -n "$LATEST" ] && echo "updated=true" >> $GITHUB_OUTPUT || echo "updated=false" >> $GITHUB_OUTPUT

      - name: Check SUSFS (android14-6.1)
        id: susfs_a14_6_1
        run: |
          PINNED="ab4c23cfc7cb26821abb7a9d2071206713c070fe"
          LATEST=$(git ls-remote https://gitlab.com/simonpunk/susfs4ksu.git refs/heads/gki-android14-6.1 | awk '{print $1}')
          echo "pinned=$PINNED" >> $GITHUB_OUTPUT; echo "latest=$LATEST" >> $GITHUB_OUTPUT
          [ "$PINNED" != "$LATEST" ] && [ -n "$LATEST" ] && echo "updated=true" >> $GITHUB_OUTPUT || echo "updated=false" >> $GITHUB_OUTPUT

      - name: Check SUSFS (android15-6.6)
        id: susfs_a15_6_6
        run: |
          PINNED="5009b9edee98fbe66b1a3cb22c603690d81b7817"
          LATEST=$(git ls-remote https://gitlab.com/simonpunk/susfs4ksu.git refs/heads/gki-android15-6.6 | awk '{print $1}')
          echo "pinned=$PINNED" >> $GITHUB_OUTPUT; echo "latest=$LATEST" >> $GITHUB_OUTPUT
          [ "$PINNED" != "$LATEST" ] && [ -n "$LATEST" ] && echo "updated=true" >> $GITHUB_OUTPUT || echo "updated=false" >> $GITHUB_OUTPUT

      - name: Check SUSFS (android16-6.12)
        id: susfs_a16_6_12
        run: |
          PINNED="5c34dec2c3b69af1d72ac4a89b179741fc602a79"
          LATEST=$(git ls-remote https://gitlab.com/simonpunk/susfs4ksu.git refs/heads/gki-android16-6.12 | awk '{print $1}')
          echo "pinned=$PINNED" >> $GITHUB_OUTPUT; echo "latest=$LATEST" >> $GITHUB_OUTPUT
          [ "$PINNED" != "$LATEST" ] && [ -n "$LATEST" ] && echo "updated=true" >> $GITHUB_OUTPUT || echo "updated=false" >> $GITHUB_OUTPUT

      - name: Check NTSYNC reference (teldommm main)
        id: ntsync
        run: |
          LATEST=$(git ls-remote https://github.com/teldommm/GKI_KernelSU_SUSFS-NTSYNC.git refs/heads/main | awk '{print $1}')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "pinned=local" >> $GITHUB_OUTPUT
          echo "updated=false" >> $GITHUB_OUTPUT

      - name: Check Droidspaces-OSS (ravindu644 main)
        id: droidspaces
        run: |
          LATEST=$(git ls-remote https://github.com/ravindu644/Droidspaces-OSS.git refs/heads/main | awk '{print $1}')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "pinned=local" >> $GITHUB_OUTPUT
          echo "updated=false" >> $GITHUB_OUTPUT

      - name: Check branch-tracked deps
        id: branches
        run: |
          PATCHES=$(git ls-remote https://github.com/WildKernels/kernel_patches.git refs/heads/main | awk '{print $1}')
          echo "kernel_patches=$PATCHES" >> $GITHUB_OUTPUT
          BBG=$(git ls-remote https://github.com/vc-teahouse/Baseband-guard.git refs/heads/main | awk '{print $1}')
          echo "bbg=$BBG" >> $GITHUB_OUTPUT
          AK3=$(git ls-remote https://github.com/WildKernels/AnyKernel3.git refs/heads/gki-2.0 | awk '{print $1}')
          echo "anykernel3=$AK3" >> $GITHUB_OUTPUT
          DUCHAMP=$(git ls-remote https://github.com/ahmed-alnassif/GKI-Duchamp.git refs/heads/master | awk '{print $1}')
          echo "duchamp=$DUCHAMP" >> $GITHUB_OUTPUT

      - name: Build report
        id: report
        shell: bash
        run: |
          HAS_UPDATES=false

          build_row() {
            local name="$1" pinned="$2" latest="$3" updated="$4" note="$5"
            local sp="${pinned:0:10}" sl="${latest:0:10}"
            if [ "$updated" = "true" ]; then
              HAS_UPDATES=true
              echo "| **${name}** | \`${sp}\` | \`${sl}\` | 🔄 Update | ${note} |"
            else
              [ -z "$latest" ] && latest_s="⚠ unreachable" || latest_s="\`${sl}\` ✅"
              echo "| ${name} | \`${sp}\` | ${latest_s} | | ${note} |"
            fi
          }

          build_upstream_row() {
            local name="$1" latest="$2" note="$3"
            local sl="${latest:0:10}"
            [ -z "$latest" ] && sl="⚠ unreachable"
            echo "| ${name} | local patches | \`${sl}\` | 🔄 Check upstream | ${note} |"
          }

          build_branch_row() {
            local name="$1" branch="$2" hash="$3" note="$4"
            local sh="${hash:0:10}"
            echo "| ${name} | \`${branch}\` | \`${sh}\` | 🔄 Branch (manual) | ${note} |"
          }

          {
            echo "## 📦 Weekly Dependency Check"
            echo ""
            echo "Ran at $(TZ=UTC date '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "### Root Solutions"
            echo ""
            echo "| Dependency | Pinned | Latest | Status | Notes |"
            echo "|---|---|---|---|---|"

            build_row "KernelSU-Next" \
              "${{ steps.ksu.outputs.pinned }}" \
              "${{ steps.ksu.outputs.latest }}" \
              "${{ steps.ksu.outputs.updated }}" \
              "Edit \`.github/actions/kernelsu/action.yml\`"

            build_row "SUSFS android12-5.10" \
              "${{ steps.susfs_a12_5_10.outputs.pinned }}" \
              "${{ steps.susfs_a12_5_10.outputs.latest }}" \
              "${{ steps.susfs_a12_5_10.outputs.updated }}" \
              "Legacy build (main.yml)"
            build_row "SUSFS android13-5.10" \
              "${{ steps.susfs_a13_5_10.outputs.pinned }}" \
              "${{ steps.susfs_a13_5_10.outputs.latest }}" \
              "${{ steps.susfs_a13_5_10.outputs.updated }}" \
              "Legacy build"
            build_row "SUSFS android13-5.15" \
              "${{ steps.susfs_a13_5_15.outputs.pinned }}" \
              "${{ steps.susfs_a13_5_15.outputs.latest }}" \
              "${{ steps.susfs_a13_5_15.outputs.updated }}" \
              "Legacy build"
            build_row "SUSFS android14-5.15" \
              "${{ steps.susfs_a14_5_15.outputs.pinned }}" \
              "${{ steps.susfs_a14_5_15.outputs.latest }}" \
              "${{ steps.susfs_a14_5_15.outputs.updated }}" \
              "Legacy build"
            build_row "SUSFS android14-6.1" \
              "${{ steps.susfs_a14_6_1.outputs.pinned }}" \
              "${{ steps.susfs_a14_6_1.outputs.latest }}" \
              "${{ steps.susfs_a14_6_1.outputs.updated }}" \
              "Pixel 6 (oriole) — primary"
            build_row "SUSFS android15-6.6" \
              "${{ steps.susfs_a15_6_6.outputs.pinned }}" \
              "${{ steps.susfs_a15_6_6.outputs.latest }}" \
              "${{ steps.susfs_a15_6_6.outputs.updated }}" \
              "Tensor device"
            build_row "SUSFS android16-6.12" \
              "${{ steps.susfs_a16_6_12.outputs.pinned }}" \
              "${{ steps.susfs_a16_6_12.outputs.latest }}" \
              "${{ steps.susfs_a16_6_12.outputs.updated }}" \
              "Future Tensor"

            echo ""
            echo "### Kernel Patches (local files, upstream reference)"
            echo ""
            echo "| Patch Set | Local | Upstream HEAD | Status | Notes |"
            echo "|---|---|---|---|---|"

            build_upstream_row "NTSYNC" \
              "${{ steps.ntsync.outputs.latest }}" \
              "Check \`kernel_patches/ntsync/\` vs teldommm"
            build_upstream_row "Droidspaces-OSS" \
              "${{ steps.droidspaces.outputs.latest }}" \
              "Check \`kernel_patches/droidspaces/\` vs ravindu644"

            echo ""
            echo "### Branch-tracked (manual review)"
            echo ""
            echo "| Dependency | Branch | HEAD | Status | Notes |"
            echo "|---|---|---|---|---|"

            KP="${{ steps.branches.outputs.kernel_patches }}"
            build_branch_row "kernel_patches (WildKernels)" "main" "$KP" "Check \`wild/\` for new hooks/patches"
            BBG="${{ steps.branches.outputs.bbg }}"
            build_branch_row "Baseband Guard" "main" "$BBG" "Vulnerability fixes"
            AK3="${{ steps.branches.outputs.anykernel3 }}"
            build_branch_row "AnyKernel3" "gki-2.0" "$AK3" "Packaging updates"
            DP="${{ steps.branches.outputs.duchamp }}"
            build_branch_row "GKI-Duchamp" "master" "$DP" "Kernel hardening patches"

            echo ""
            echo "### Quick actions"
            echo ""
            echo "| When this is flagged | Do this |"
            echo "|---|---|"
            echo "| KSUN or SUSFS updated | Update commit hash in \`.github/actions/*/action.yml\` → push → auto-build triggers |"
            echo "| NTSYNC upstream changed | Review \`teldommm/GKI_KernelSU_SUSFS-NTSYNC\` diff, update \`kernel_patches/ntsync/\` |"
            echo "| Droidspaces upstream changed | Review \`ravindu644/Droidspaces-OSS\` diff, update \`kernel_patches/droidspaces/\` |"
            echo "| Branch dep HEAD changed | Review commits, cherry-pick relevant changes |"
            echo ""
            echo "---"
            echo "_Auto-generated by \`dep-check.yml\` · runs Saturdays 06:00 UTC_"
          } > /tmp/report.md

          echo "has_updates=${HAS_UPDATES}" >> $GITHUB_OUTPUT

          write_flag() { echo "$1" > "/tmp/trigger-$2"; }
          write_flag "${{ steps.susfs_a12_5_10.outputs.updated }}" "susfs_a12_5_10"
          write_flag "${{ steps.susfs_a13_5_10.outputs.updated }}" "susfs_a13_5_10"
          write_flag "${{ steps.susfs_a13_5_15.outputs.updated }}" "susfs_a13_5_15"
          write_flag "${{ steps.susfs_a14_5_15.outputs.updated }}" "susfs_a14_5_15"
          write_flag "${{ steps.susfs_a14_6_1.outputs.updated }}"  "susfs_a14_6_1"
          write_flag "${{ steps.susfs_a15_6_6.outputs.updated }}"  "susfs_a15_6_6"
          write_flag "${{ steps.susfs_a16_6_12.outputs.updated }}" "susfs_a16_6_12"
          write_flag "${{ steps.ksu.outputs.updated }}" "ksu"

      - name: Dispatch builds on updates
        if: steps.report.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function readFlag(stepId) {
              try {
                return fs.readFileSync(`/tmp/trigger-${stepId}`, 'utf8').trim() === 'true';
              } catch { return false; }
            }

            const legacyInputs = {
              release_type: 'Action', susfs: 'true', use_repo: 'true',
              root: 'KernelSU-Next', variant: 'Normal',
            };
            const legacyMap = [
              ['susfs_a12_5_10', 'build_a12_5_10'],
              ['susfs_a13_5_10', 'build_a13_5_10'],
              ['susfs_a13_5_15', 'build_a13_5_15'],
              ['susfs_a14_5_15', 'build_a14_5_15'],
            ];
            let legacyTriggered = false;
            for (const [stepId, input] of legacyMap) {
              if (readFlag(stepId)) { legacyInputs[input] = 'true'; legacyTriggered = true; }
            }
            if (legacyTriggered) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner, repo: context.repo.repo,
                workflow_id: 'main.yml', ref: 'main', inputs: legacyInputs,
              });
            }

            const tensorInputs = {
              release_type: 'Action', susfs: 'true', use_repo: 'true',
              root: 'KernelSU-Next', variant: 'Normal',
            };
            const tensorMap = [
              ['susfs_a14_6_1',  'build_a14_6_1'],
              ['susfs_a15_6_6',  'build_a15_6_6'],
              ['susfs_a16_6_12', 'build_a16_6_12'],
            ];
            let tensorTriggered = false;
            for (const [stepId, input] of tensorMap) {
              if (readFlag(stepId)) { tensorInputs[input] = 'true'; tensorTriggered = true; }
            }
            if (readFlag('ksu')) {
              tensorInputs.build_a14_6_1 = 'true';
              tensorTriggered = true;
            }
            if (tensorTriggered) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner, repo: context.repo.repo,
                workflow_id: 'pixel.yml', ref: 'main', inputs: tensorInputs,
              });
            }

      - name: Create or update issue
        if: steps.report.outputs.has_updates == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const { owner, repo } = context.repo;

            try {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', labels: 'deps'
              });

              const existing = issues.find(i =>
                i.title === '📦 Weekly Dependency Check'
              );

              if (existing) {
                await github.rest.issues.update({
                  owner, repo, issue_number: existing.number, body
                });
                console.log(`Updated issue #${existing.number}`);
              } else {
                await github.rest.issues.create({
                  owner, repo,
                  title: '📦 Weekly Dependency Check',
                  body, labels: ['deps']
                });
                console.log('Created new issue');
              }
            } catch (err) {
              console.log(`Skipping issue: ${err.message}`);
            }
