name: Build Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        type: choice
        options:
          - Action
          - Pre-Release
          - Release
        default: Action
      build_a12_5_10:
        description: "Android 12 - 5.10"
        type: boolean
        default: false
      build_a13_5_10:
        description: "Android 13 - 5.10"
        type: boolean
        default: false
      build_a13_5_15:
        description: "Android 13 - 5.15"
        type: boolean
        default: false
      build_a14_5_15:
        description: "Android 14 - 5.15"
        type: boolean
        default: false
      build_a14_6_1:
        description: "Android 14 - 6.1"
        type: boolean
        default: false
      build_a15_6_6:
        description: "Android 15 - 6.6"
        type: boolean
        default: false
      build_a16_6_12:
        description: "Android 16 - 6.12"
        type: boolean
        default: false
      root:
        description: "Root solution"
        type: choice
        options:
          - KernelSU-Next
          - SukiSU-Ultra
          - ReSukiSU
        default: KernelSU-Next
      susfs:
        description: "Include SUSFS"
        type: boolean
        default: true
      variant:
        description: "Build Variant"
        type: choice
        options:
          - Normal
          - Bypass
          - DUSK
        default: Normal
      use_repo:
        description: "Use repo for downloading kernel source"
        type: boolean
        default: true
      build_companion:
        description: "Build DUSK Companion module"
        type: boolean
        default: false

jobs:
  build-a12-5-10:
    if: inputs.build_a12_5_10
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a12-5.10.json
      root: ${{ inputs.root }}
      susfs: ${{ inputs.susfs }}
      variant: ${{ inputs.variant || 'Normal' }}
      use_repo: ${{ inputs.use_repo }}
    secrets: inherit

  build-a13-5-10:
    if: inputs.build_a13_5_10
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a13-5.10.json
      root: ${{ inputs.root }}
      susfs: ${{ inputs.susfs }}
      variant: ${{ inputs.variant || 'Normal' }}
      use_repo: ${{ inputs.use_repo }}
    secrets: inherit

  build-a13-5-15:
    if: inputs.build_a13_5_15
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a13-5.15.json
      root: ${{ inputs.root }}
      susfs: ${{ inputs.susfs }}
      variant: ${{ inputs.variant || 'Normal' }}
      use_repo: ${{ inputs.use_repo }}
    secrets: inherit

  build-a14-5-15:
    if: inputs.build_a14_5_15
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a14-5.15.json
      root: ${{ inputs.root }}
      susfs: ${{ inputs.susfs }}
      variant: ${{ inputs.variant || 'Normal' }}
      use_repo: ${{ inputs.use_repo }}
    secrets: inherit

  build-a14-6-1:
    if: inputs.build_a14_6_1
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a14-6.1.json
      root: ${{ inputs.root }}
      susfs: ${{ inputs.susfs }}
      variant: ${{ inputs.variant || 'Normal' }}
      use_repo: ${{ inputs.use_repo }}
    secrets: inherit

  build-a15-6-6:
    if: inputs.build_a15_6_6
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a15-6.6.json
      root: ${{ inputs.root }}
      susfs: ${{ inputs.susfs }}
      variant: ${{ inputs.variant || 'Normal' }}
      use_repo: ${{ inputs.use_repo }}
    secrets: inherit

  build-a16-6-12:
    if: inputs.build_a16_6_12
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a16-6.12.json
      root: ${{ inputs.root }}
      susfs: ${{ inputs.susfs }}
      variant: ${{ inputs.variant || 'Normal' }}
      use_repo: ${{ inputs.use_repo }}
    secrets: inherit

  build-companion:
    if: inputs.build_companion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Generate artifact name
        id: name
        run: |
          VERSION=$(grep '^version=' companion/module/module.prop | cut -d= -f2 | tr -d 'v')
          echo "artifact_name=dusk-companion-v${VERSION}_run_${{ github.run_number }}_$(TZ=UTC date +%d.%m.%y)" >> "$GITHUB_OUTPUT"
      - name: Upload Companion Module
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.name.outputs.artifact_name }}
          path: companion/module/
          if-no-files-found: ignore

  rej:
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    needs:
    - build-a12-5-10
    - build-a13-5-10
    - build-a13-5-15
    - build-a14-5-15
    - build-a14-6-1
    - build-a15-6-6
    - build-a16-6-12

    steps:
    - name: Download Misc Artifacts
      uses: actions/download-artifact@v7
      with:
        path: ./downloaded-artifacts
        pattern: '*-Normal-Rejects'
        merge-multiple: false

    - name: Process Reject Artifacts
      run: |
        mkdir -p aio-rejects
        
        # Iterate over Rejects artifacts in downloaded-artifacts
        for dir in ./downloaded-artifacts/*-Rejects; do
            # Ensure it is a directory
            [ -d "$dir" ] || continue
            
            dirname=$(basename "$dir")
            # Process each reject artifact
            
            # Get original name (remove -Rejects suffix)
            original_name=${dirname%-Rejects}
            
            mkdir -p "aio-rejects/$original_name"
            
            # Check for patch-rejects folder (legacy structure) or direct contents
            if [ -d "$dir/patch-rejects" ]; then
              # Legacy structure
                cp -r "$dir/patch-rejects/." "aio-rejects/$original_name/"
            else
              # Current structure
                cp -r "$dir/." "aio-rejects/$original_name/"
            fi
        done
        
        # Zip and upload if we found anything
        if [ "$(ls -A aio-rejects)" ]; then
            # Create a single zip of all rejects
            cd aio-rejects
            zip -r -q -9 ../AIO-REJ.zip .
            cd ..
        else
            echo "No rejects found to upload."
        fi

    - name: Upload AIO-REJ Artifact
      uses: actions/upload-artifact@v7
      with:
        name: AIO-REJ
        path: AIO-REJ.zip
        if-no-files-found: ignore

  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type != 'Actions' }}
    permissions:
      contents: write
    needs:
    - build-a12-5-10
    - build-a13-5-10
    - build-a13-5-15
    - build-a14-5-15
    - build-a14-6-1
    - build-a15-6-6
    - build-a16-6-12

    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_NAME: "DUSK Kernel"
      RELEASE_BODY: ""
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
    - name: Validate Selected Builds
      run: |
        set -euo pipefail

        failed=0

        validate() {
          local checked="$1"
          local job_name="$2"
          local result="$3"
          if [[ "$checked" == "true" && "$result" != "success" ]]; then
            echo "Required job $job_name did not succeed (result: $result)"
            failed=1
          fi
        }

        validate "${{ inputs.build_a12_5_10 }}" "build-a12-5-10" "${{ needs.build-a12-5-10.result }}"
        validate "${{ inputs.build_a13_5_10 }}" "build-a13-5-10" "${{ needs.build-a13-5-10.result }}"
        validate "${{ inputs.build_a13_5_15 }}" "build-a13-5-15" "${{ needs.build-a13-5-15.result }}"
        validate "${{ inputs.build_a14_5_15 }}" "build-a14-5-15" "${{ needs.build-a14-5-15.result }}"
        validate "${{ inputs.build_a14_6_1 }}" "build-a14-6-1" "${{ needs.build-a14-6-1.result }}"
        validate "${{ inputs.build_a15_6_6 }}" "build-a15-6-6" "${{ needs.build-a15-6-6.result }}"
        validate "${{ inputs.build_a16_6_12 }}" "build-a16-6-12" "${{ needs.build-a16-6-12.result }}"

        if [[ "$failed" -ne 0 ]]; then
          exit 1
        fi

    - name: Free Disk Space
      if: true
      uses: endersonmenezes/free-disk-space@v3
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
        remove_tool_cache: true
        remove_swap: true
        remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
        remove_packages_one_command: true
        remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
        rm_cmd: "rmz"
        rmz_version: "3.1.1"
        testing: false

    - name: Checkout code
      uses: actions/checkout@v5

    - name: Generate New Tag
      id: tag
      if: inputs.release_type != 'Actions'
      run: |
        LATEST_TAG=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name' 2>/dev/null || echo "v0.0.0")
        if [[ -z "$LATEST_TAG" || "$LATEST_TAG" == "null" ]]; then
          LATEST_TAG="v0.0.0"
        fi
        
        if [[ "$LATEST_TAG" =~ ^(.*)-r([0-9]+)$ ]]; then
          VERSION="${BASH_REMATCH[1]}"
          REV="${BASH_REMATCH[2]}"
          NEW_REV=$((REV + 1))
          NEW_TAG="${VERSION}-r${NEW_REV}"
        else
          NEW_TAG="${LATEST_TAG}-r1"
        fi
        
        echo "Latest tag: $LATEST_TAG"
        echo "New tag: $NEW_TAG"
        echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
        echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

    - name: Set release body
      run: |
        set -e

        ROOT="${{ inputs.root }}"
        SUSFS="${{ inputs.susfs }}"
        KSUN_COMMIT="v3.2.0"
        KSUN_TAG="stable"
        KSU_COMMIT="main"
        SKSU_COMMIT="builtin"
        AK3_COMMIT="gki-2.0"
        PATCHES_COMMIT="main"
        SUSFS_MAP="gki-android12-5.10:e2b0f05ccca5f8fdfc33991c036672235ce48f05,gki-android13-5.10:97234f8e35cdc3b8ea22d05c98ab9829f6421d67,gki-android13-5.15:bf9bf0091bcd4d0072d845ea62484f3011f8d5a8,gki-android14-5.15:667368cf274311a62971671035738b154be1c062,gki-6.1:9bf72ec2c83d40f194b936cabbc64ce342e005bf,gki-6.6:5009b9edee98fbe66b1a3cb22c603690d81b7817,gki-6.12:5c34dec2c3b69af1d72ac4a89b179741fc602a79"
        BBG_COMMIT="main"
        SUSFS_VERSION="v2.1.0"
        : > release_body.md

        {
          echo
          echo "**IMPORTANT DISCLAIMER**"
          echo "This software is provided for testing and educational purposes only. Use at your own risk."
          echo "The developers are not responsible for any damage, data loss, or issues that may occur."
          echo "Please ensure you have proper backups before installation."
          echo
          echo "## 🔧 Build Configuration"
          echo "| Component | Version/Setting |"
          echo "|---|---|"
          echo "| Root Solution | ${ROOT} |"
          if [[ "$SUSFS" == "true" ]]; then
            echo "| SUSFS | ${SUSFS_VERSION} |"
          fi
          echo "| AnyKernel3 Commit | ${AK3_COMMIT} |"
          echo "| Kernel Patches Commit | ${PATCHES_COMMIT} |"
          echo "| BBG Commit | ${BBG_COMMIT} |"
          echo "| Optimization Level | O2 |"
          echo "| Clean Build | ❌ No (ccache enabled) |"
          echo
        } >> release_body.md

        if [[ "$SUSFS" == "true" ]]; then
          echo "## 📌 SUSFS Branch Mapping" >> release_body.md
          echo "| Kernel Version | SUSFS Commit |" >> release_body.md
          echo "|---|---|" >> release_body.md
          echo "$SUSFS_MAP" | tr ',' '\n' | while IFS=':' read -r branch commit; do
            [ -n "${branch:-}" ] || continue
            [ -n "${commit:-}" ] || continue
            kernel_version="${branch#gki-}"
            echo "| ${kernel_version} | ${commit} |" >> release_body.md
          done
          echo "" >> release_body.md
        fi

        {
          echo "## ✨ Features & Capabilities"
          echo "### 🔐 Root Management"
          echo "- ${ROOT}"
          if [[ "$SUSFS" == "true" ]]; then
            echo "- SUSFS ${SUSFS_VERSION} (kernel-level root hiding)"
          fi
          echo ""
          echo "### 🚀 Performance & Networking"
          echo "- Timer frequency HZ=300"
          echo "- Multi-Gen LRU"
          echo "- ZRAM with writeback + memory tracking"
          echo "- TCP BBRv3 + Westwood + FQ"
          echo "- IP Set full support + IPv6 NAT"
          echo "- F2FS tuning (GC sleep 50ms, checkpoint RT)"
          echo "- Memory optimizations (optimized memcpy/memcmp/memset, fast int_sqrt)"
          echo "- Battery tweaks (500ms wakelock cap, 1s freeze timeout)"
          echo "- tcp_nodelay forced"
          echo ""
          echo "### 🛡️ Security & Privacy"
          echo "- Baseband Guard (BBG): https://github.com/vc-teahouse/Baseband-guard"
          echo ""
          echo "### 🎮 Additional"
          echo "- NTSYNC (Windows sync primitives for Wine)"
          echo "- DroidSpaces-OSS (multi-space support)"
          echo "- Unicode bypass fix"
          echo "- Ptrace leak fix"
          echo "- Silenced log spam"
          echo ""
          echo "## 📦 Release Files"
          echo "- AnyKernel3: uploaded as ZIP in the Release"
          echo "- Boot images: uploaded as raw .img files in the Release"
          echo ""
          echo "## 📥 Recommended Tools"
          echo "- Kernel Flasher: https://github.com/fatalcoder524/KernelFlasher/"
          if [[ "$ROOT" == "KernelSU-Next" ]]; then
            echo "- KernelSU-Next Manager: https://github.com/KernelSU-Next/KernelSU-Next"
          elif [[ "$ROOT" == "SukiSU-Ultra" ]]; then
            echo "- SukiSU Manager: https://github.com/SukiSU-Ultra/SukiSU-Ultra"
          elif [[ "$ROOT" == "ReSukiSU" ]]; then
            echo "- ReSukiSU Manager: https://github.com/KOWX712/KernelSU_ReSukiSU"
          fi
          if [[ "$SUSFS" == "true" ]]; then
            echo "- SUSFS Module: https://github.com/sidex15/ksu_module_susfs"
          fi
        } >> release_body.md

    - name: Workflow Summary
      if: ${{ always() }}
      run: |
        set -e

        ROOT="${{ inputs.root }}"
        KSUN_COMMIT="v3.2.0"
        KSUN_TAG="stable"
        AK3_COMMIT="gki-2.0"
        PATCHES_COMMIT="main"
        SUSFS_MAP="gki-android12-5.10:e2b0f05ccca5f8fdfc33991c036672235ce48f05,gki-android13-5.10:97234f8e35cdc3b8ea22d05c98ab9829f6421d67,gki-android13-5.15:bf9bf0091bcd4d0072d845ea62484f3011f8d5a8,gki-android14-5.15:667368cf274311a62971671035738b154be1c062,gki-6.1:9bf72ec2c83d40f194b936cabbc64ce342e005bf,gki-6.6:5009b9edee98fbe66b1a3cb22c603690d81b7817,gki-6.12:5c34dec2c3b69af1d72ac4a89b179741fc602a79"
        BBG_COMMIT="main"

        short() { echo "${1:0:8}"; }

        {
          echo "## 📦 Components"
          echo "| Component | Version |"
          echo "|---|---|"
          echo "| Root Solution | ${ROOT} |"
          echo "| SUSFS | ${{ inputs.susfs }} |"
          echo "| AnyKernel3 | $(short "$AK3_COMMIT") |"
          echo "| Kernel Patches | $(short "$PATCHES_COMMIT") |"
          echo "| BBG | $(short "$BBG_COMMIT") |"
        } >> "$GITHUB_STEP_SUMMARY"

        if [[ "${{ inputs.susfs }}" == "true" ]]; then
          {
            echo
            echo "## 📌 SUSFS Branch Mapping"
            echo "| Kernel Version | SUSFS Commit |"
            echo "|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "$SUSFS_MAP" | tr ',' '\n' | while IFS=':' read -r branch commit; do
            [ -n "${branch:-}" ] || continue
            [ -n "${commit:-}" ] || continue
            kernel_version="${branch#gki-}"
            echo "| ${kernel_version} | ${commit} |" >> "$GITHUB_STEP_SUMMARY"
          done
        fi

    - name: Download AnyKernel3 Artifacts
      uses: actions/download-artifact@v7
      with:
        path: release-assets
        pattern: '*-AnyKernel3'
        merge-multiple: false

    - name: Download Boot Image Artifacts
      uses: actions/download-artifact@v7
      with:
        path: release-assets
        pattern: '*-BootImages'
        merge-multiple: false

    - name: Zip AnyKernel3 for Release
      run: |
        set -e
        shopt -s nullglob

        for dir in release-assets/*-AnyKernel3; do
          zip_name="${dir}.zip"
          rm -f "$zip_name"
          cd "$dir"
          zip -r -q -9 "../$(basename "$zip_name")" .
          cd - >/dev/null
        done

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.new_tag }}
        name: ${{ steps.tag.outputs.new_tag }}
        body_path: release_body.md
        draft: false
        prerelease: ${{ inputs.release_type == 'Pre-Release' }}
        files: |
          release-assets/**/*.zip
          release-assets/**/*-boot*.img
