name: Prepare and Build

on:
  workflow_call:
    inputs:
      config_file:
        description: "Path to the JSON config file"
        required: true
        type: string
      root:
        description: "Root solution (KernelSU-Next, SukiSU-Ultra, ReSukiSU)"
        required: false
        type: string
        default: KernelSU-Next
      susfs:
        description: "Include SUSFS"
        required: false
        type: boolean
        default: true
      variant:
        description: "Build Variant (Normal, Bypass, DUSK)"
        required: false
        type: string
        default: Normal
      use_repo:
        description: "Use repo for downloading kernel source"
        required: false
        type: boolean
        default: false

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.final.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Read Config and Build Final Matrix
        id: final
        shell: bash
        run: |
          if [ ! -f "${{ inputs.config_file }}" ]; then
            echo "Error: Config file not found: ${{ inputs.config_file }}"
            exit 1
          fi

          CONFIG_JSON=$(cat "${{ inputs.config_file }}" | jq -c .)

          # Build the variant list as a JSON array
          if [ "${{ inputs.variant }}" = "All" ] || [ -z "${{ inputs.variant }}" ]; then
            VARIANTS='["Normal","Bypass"]'
          else
            VARIANTS=$(jq -cn --arg v "${{ inputs.variant }}" '[$v]')
          fi

          # Build { "include": [ {kernel_version:..., variant: ...}, ... ] }
          FINAL=$(jq -cn \
            --argjson cfg "$CONFIG_JSON" \
            --argjson variants "$VARIANTS" '
            {
              include: [
                $cfg.include[] as $item
                | $variants[] as $variant
                | $item + {variant: $variant}
              ]
            }')

          echo "matrix=$FINAL" >> "$GITHUB_OUTPUT"

  build:
    needs: generate-matrix
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    uses: ./.github/workflows/build.yml
    with:
      kernel_version: ${{ matrix.kernel_version }}
      root: ${{ inputs.root }}
      susfs: ${{ inputs.susfs }}
      variant: ${{ inputs.variant }}
      use_repo: ${{ inputs.use_repo }}
    secrets: inherit
