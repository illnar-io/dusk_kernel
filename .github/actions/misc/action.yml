name: "Setup Misc Configs"
description: "Set up kernel configuration fragment with miscellaneous options"
inputs:
  kernel_version:
    description: "Kernel version (e.g., 6.1)"
    required: true
  android_version:
    description: "Android version (e.g., android14)"
    required: true
  ksu_compat:
    description: "KSU compat mode - keep debug enabled"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Apply Kernel Configuration
      shell: bash
      run: |
        KERNEL_COMMON="${{ github.workspace }}/kernel/common"
        FRAGMENT="${{ github.workspace }}/wild_gki.fragment"

        # Helper: check if config option exists in kernel Kconfig tree
        config_exists() {
          local opt="$1"
          grep -rq "config ${opt}\b" "$KERNEL_COMMON" 2>/dev/null && return 0
          return 1
        }

        # Helper: add config to fragment if its option exists in Kconfig
        add_cfg() {
          local line="$1"
          local opt="${line#CONFIG_}"
          opt="${opt%%[= ]*}"
          if config_exists "$opt"; then
            echo "$line" >> "$FRAGMENT"
          else
            echo "  ⚠ skipping CONFIG_${opt} (not found in Kconfig)" >&2
          fi
        }

        cat >> "$FRAGMENT" << 'EOF'
        # Mountify Support
        CONFIG_OVERLAY_FS=y
        CONFIG_TMPFS_XATTR=y
        CONFIG_TMPFS_POSIX_ACL=y

        # KPatch-Next Support
        CONFIG_KALLSYMS=y
        CONFIG_KALLSYMS_ALL=y

        # User Namespaces (required for Droidspaces, containers, and ntsync)
        CONFIG_USER_NS=y

        # === Phase 1 — DUSK Kernel Report improvements ===

        # MGLRU (Multi-Gen LRU) for better memory management on 6-8GB RAM
        CONFIG_LRU_GEN=y
        CONFIG_LRU_GEN_ENABLED=y

        # ZRAM: module + zstd default (multi-compression built-in on 6.1.157+)
        CONFIG_ZRAM=m
        # CONFIG_ZRAM_DEF_COMP_LZORLE is not set
        CONFIG_ZRAM_DEF_COMP_ZSTD=y
        CONFIG_ZRAM_DEF_COMP="zstd"

        # RCU_LAZY: activate by default (was DEFAULT_OFF)
        # CONFIG_RCU_LAZY_DEFAULT_OFF is not set

        # EAS uclamp tuning for better task placement
        CONFIG_UCLAMP_TASK=y

        # F2FS GC tuning (aggressive on charge) — Phase2 DUSK Report
        # Note: CONFIG_F2FS_GC_RECOVERY doesn't exist - it's SBI_IS_RECOVERED runtime flag
        # Valid F2FS config options for 6.1:
        CONFIG_F2FS_FS=y
        CONFIG_F2FS_FS_COMPRESSION=y
        CONFIG_F2FS_FS_LZ4=y
        CONFIG_F2FS_FS_LZ4HC=y
        CONFIG_F2FS_FS_ZSTD=y
        CONFIG_F2FS_FS_LZO=y
        CONFIG_F2FS_FS_LZORLE=y
        CONFIG_F2FS_UNFAIR_RWSEM=y
        EOF

        # Trim unused symbols - disable only if GKI allows it
        if ! grep -q "CONFIG_TRIM_UNUSED_KSYMS=y" "$KERNEL_COMMON/arch/arm64/configs/gki_defconfig" 2>/dev/null; then
          echo '# CONFIG_TRIM_UNUSED_KSYMS is not set' >> "$FRAGMENT"
        fi

        # === Duchamp Performance Tuning ===
        # Add with Kconfig existence checks
        add_cfg "CONFIG_HZ_300=y"
        add_cfg "CONFIG_HZ=300"
        add_cfg "CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y"
        add_cfg "CONFIG_CPU_FREQ_GOV_ONDEMAND=y"
        add_cfg "CONFIG_FRAME_WARN=0"
        add_cfg "CONFIG_OPTIMIZE_INLINING=y"
        add_cfg "CONFIG_ZRAM_WRITEBACK=y"
        add_cfg "CONFIG_ZRAM_MEMORY_TRACKING=y"
        add_cfg "CONFIG_MQ_IOSCHED_DEADLINE=y"
        add_cfg "CONFIG_NET_SCH_FQ=y"
        add_cfg "CONFIG_TCP_CONG_ADVANCED=y"
        add_cfg "CONFIG_DEFAULT_BBR=y"
        add_cfg "CONFIG_TCP_CONG_BBR=y"
        add_cfg "CONFIG_TCP_CONG_WESTWOOD=y"
        add_cfg "CONFIG_IP_NF_TARGET_TTL=y"
        add_cfg "CONFIG_IP_SET=y"
        add_cfg "CONFIG_IP_SET_MAX=65534"
        add_cfg "CONFIG_IP_SET_BITMAP_IP=y"
        add_cfg "CONFIG_IP_SET_BITMAP_IPMAC=y"
        add_cfg "CONFIG_IP_SET_BITMAP_PORT=y"
        add_cfg "CONFIG_IP_SET_HASH_IP=y"
        add_cfg "CONFIG_IP_SET_HASH_IPMARK=y"
        add_cfg "CONFIG_IP_SET_HASH_IPPORT=y"
        add_cfg "CONFIG_IP_SET_HASH_IPPORTIP=y"
        add_cfg "CONFIG_IP_SET_HASH_IPPORTNET=y"
        add_cfg "CONFIG_IP_SET_HASH_IPMAC=y"
        add_cfg "CONFIG_IP_SET_HASH_MAC=y"
        add_cfg "CONFIG_IP_SET_HASH_NETPORTNET=y"
        add_cfg "CONFIG_IP_SET_HASH_NET=y"
        add_cfg "CONFIG_IP_SET_HASH_NETNET=y"
        add_cfg "CONFIG_IP_SET_HASH_NETPORT=y"
        add_cfg "CONFIG_IP_SET_HASH_NETIFACE=y"
        add_cfg "CONFIG_IP_SET_LIST_SET=y"
        add_cfg "CONFIG_NETFILTER_XT_SET=y"
        add_cfg "CONFIG_IP6_NF_NAT=y"
        add_cfg "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
        add_cfg "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
        add_cfg "CONFIG_IP6_NF_TARGET_HL=y"
        add_cfg "CONFIG_IP6_NF_MATCH_HL=y"

        # Note: disabling debug via =n is incompatible with GKI config checker
        # when dependencies aren't met. These default to n in production builds.
