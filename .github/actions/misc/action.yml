name: "Setup Misc Configs"
description: "Set up kernel configuration fragment with miscellaneous options"
inputs:
  kernel_version:
    description: "Kernel version (e.g., 6.1)"
    required: true
  android_version:
    description: "Android version (e.g., android14)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Apply Kernel Configuration
      shell: bash
      run: |
        KERNEL_COMMON="${{ github.workspace }}/kernel/common"
        FRAGMENT="${{ github.workspace }}/wild_gki.fragment"

        # Helper: check if config option exists in kernel Kconfig tree
        config_exists() {
          local opt="$1"
          grep -rq "config ${opt}\b" "$KERNEL_COMMON" 2>/dev/null && return 0
          return 1
        }

        # Helper: add config to fragment if its option exists in Kconfig
        add_cfg() {
          local line="$1"
          local opt="${line#CONFIG_}"
          opt="${opt%%[= ]*}"
          if config_exists "$opt"; then
            echo "$line" >> "$FRAGMENT"
          else
            echo "  ⚠ skipping CONFIG_${opt} (not found in Kconfig)" >&2
          fi
        }

        cat >> "$FRAGMENT" << 'EOF'
        # Mountify Support
        CONFIG_OVERLAY_FS=y
        CONFIG_TMPFS_XATTR=y
        CONFIG_TMPFS_POSIX_ACL=y

        # KPatch-Next Support
        CONFIG_KALLSYMS=y
        CONFIG_KALLSYMS_ALL=y

        # Container/Droidspaces Support
        CONFIG_NAMESPACES=y
        CONFIG_NET_NS=y
        CONFIG_VETH=y
        CONFIG_MEMCG=y
        CONFIG_CGROUP_SCHED=y
        CONFIG_CGROUP_FREEZER=y
        CONFIG_CGROUP_CPUACCT=y
        EOF

        # User Namespaces (required for Droidspaces, containers, and ntsync)
        # Skip on 5.10 — Android GKI 5.10 has header stubs that conflict with
        # real implementations when CONFIG_USER_NS is enabled.
        if [ "${{ inputs.kernel_version }}" != "5.10" ]; then
            echo 'CONFIG_USER_NS=y' >> "$FRAGMENT"
        else
            echo "  ⚠ skipping CONFIG_USER_NS (not compatible on kernel 5.10)" >&2
        fi
