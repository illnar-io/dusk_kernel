name: "Setup Misc Configs"
description: "Set up kernel configuration fragment with miscellaneous options"
inputs:
  kernel_version:
    description: "Kernel version (e.g., 6.1)"
    required: true
  android_version:
    description: "Android version (e.g., android14)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Apply Kernel Configuration
      shell: bash
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # Mountify Support
        CONFIG_OVERLAY_FS=y
        CONFIG_TMPFS_XATTR=y
        CONFIG_TMPFS_POSIX_ACL=y

        # KPatch-Next Support
        CONFIG_KALLSYMS=y
        CONFIG_KALLSYMS_ALL=y

        # CONFIG_TRIM_UNUSED_KSYMS is not set

        # User Namespaces (required for Droidspaces, containers, and ntsync)
        CONFIG_USER_NS=y

        # === Phase 1 — DUSK Kernel Report improvements ===

        # MGLRU (Multi-Gen LRU) for better memory management on 6-8GB RAM
        CONFIG_LRU_GEN=y
        CONFIG_LRU_GEN_ENABLED=y

        # ZRAM: module + zstd default (multi-compression built-in on 6.1.157+)
        CONFIG_ZRAM=m
        # CONFIG_ZRAM_DEF_COMP_LZORLE is not set
        CONFIG_ZRAM_DEF_COMP_ZSTD=y
        CONFIG_ZRAM_DEF_COMP="zstd"

        # RCU_LAZY: activate by default (was DEFAULT_OFF)
        # CONFIG_RCU_LAZY_DEFAULT_OFF is not set

        # EAS uclamp tuning for better task placement
        CONFIG_UCLAMP_TASK=y

        # F2FS GC tuning (aggressive on charge) — Phase2 DUSK Report
        # Note: CONFIG_F2FS_GC_RECOVERY doesn't exist - it's SBI_IS_RECOVERED runtime flag
        # Valid F2FS config options for 6.1:
        CONFIG_F2FS_FS=y
        CONFIG_F2FS_FS_COMPRESSION=y
        CONFIG_F2FS_FS_LZ4=y
        CONFIG_F2FS_FS_LZ4HC=y
        CONFIG_F2FS_FS_ZSTD=y
        CONFIG_F2FS_FS_LZO=y
        CONFIG_F2FS_FS_LZORLE=y
        CONFIG_F2FS_UNFAIR_RWSEM=y

        # === Duchamp Performance Tuning ===

        # 300Hz timer for lower scheduling latency
        CONFIG_HZ_300=y
        CONFIG_HZ=300

        # Explicit CPUFreq governors
        CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
        CONFIG_CPU_FREQ_GOV_ONDEMAND=y

        # Zero frame warn (avoids build warnings for large stack frames)
        CONFIG_FRAME_WARN=0

        # Optimize inlining for performance
        CONFIG_OPTIMIZE_INLINING=y

        # ZRAM writeback + memory tracking
        CONFIG_ZRAM_WRITEBACK=y
        CONFIG_ZRAM_MEMORY_TRACKING=y

        # Modern I/O scheduler
        CONFIG_MQ_IOSCHED_DEADLINE=y
        CONFIG_DEFAULT_DEADLINE=y

        # TCP congestion: BBRv3 support with FQ
        CONFIG_NET_SCH_FQ=y
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_DEFAULT_BBR=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_TCP_CONG_WESTWOOD=y

        # TTL netfilter target
        CONFIG_IP_NF_TARGET_TTL=y

        # IP Set full support
        CONFIG_IP_SET=y
        CONFIG_IP_SET_MAX=65534
        CONFIG_IP_SET_BITMAP_IP=y
        CONFIG_IP_SET_BITMAP_IPMAC=y
        CONFIG_IP_SET_BITMAP_PORT=y
        CONFIG_IP_SET_HASH_IP=y
        CONFIG_IP_SET_HASH_IPMARK=y
        CONFIG_IP_SET_HASH_IPPORT=y
        CONFIG_IP_SET_HASH_IPPORTIP=y
        CONFIG_IP_SET_HASH_IPPORTNET=y
        CONFIG_IP_SET_HASH_IPMAC=y
        CONFIG_IP_SET_HASH_MAC=y
        CONFIG_IP_SET_HASH_NETPORTNET=y
        CONFIG_IP_SET_HASH_NET=y
        CONFIG_IP_SET_HASH_NETNET=y
        CONFIG_IP_SET_HASH_NETPORT=y
        CONFIG_IP_SET_HASH_NETIFACE=y
        CONFIG_IP_SET_LIST_SET=y
        CONFIG_NETFILTER_XT_SET=y

        # IPv6 NAT full support
        CONFIG_IP6_NF_NAT=y
        CONFIG_IP6_NF_TARGET_MASQUERADE=y
        CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
        CONFIG_IP6_NF_TARGET_HL=y
        CONFIG_IP6_NF_MATCH_HL=y

        # Disable heavy debug for performance
        CONFIG_UBSAN=n
        CONFIG_PAGE_OWNER=n
        CONFIG_RCU_TRACE=n
        EOF
