name: 'Verify Kernel Config'
description: 'Check generated .config for required options'
inputs:
  kernel_version:
    description: 'Kernel version (e.g., 5.10)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Verify Droidspaces and container configs
      shell: bash
      run: |
        set -euo pipefail

        REQUIRED_OPTIONS=(
          "CONFIG_SYSVIPC=y"
          "CONFIG_POSIX_MQUEUE=y"
          "CONFIG_DEVTMPFS=y"
          "CONFIG_UTS_NS=y"
          "CONFIG_CGROUP_DEVICE=y"
          "CONFIG_CGROUP_PIDS=y"
          "CONFIG_MEMCG=y"
          "CONFIG_CGROUP_SCHED=y"
          "CONFIG_CGROUP_FREEZER=y"
          "CONFIG_CGROUP_CPUACCT=y"
          "CONFIG_USER_NS=y"
          "CONFIG_OVERLAY_FS=y"
          "CONFIG_NET_NS=y"
          "CONFIG_VETH=y"
          "CONFIG_KSU=y"
        )

        # These namespaces are not supported on kernel 5.10 (header stubs
        # conflict with real implementations, same pattern as CONFIG_USER_NS).
        if [ "${{ inputs.kernel_version }}" != "5.10" ]; then
          REQUIRED_OPTIONS+=("CONFIG_IPC_NS=y" "CONFIG_PID_NS=y")
        fi

        # NTSYNC is only expected when the backport was successfully applied.
        if [ "${NTSYNC_CONFIGURED:-false}" = "true" ]; then
          REQUIRED_OPTIONS+=("CONFIG_NTSYNC=y")
        fi

        # Try to locate the generated .config — search common Bazel/build paths
        CONFIG=""
        SEARCH_PATHS=(
          "${{ github.workspace }}/kernel/bazel-bin/common/kernel_aarch64/.config"
          "${{ github.workspace }}/kernel/out/${ANDROID_VERSION}-${KERNEL_VERSION}/.config"
          "${{ github.workspace }}/kernel/.config"
        )

        for CANDIDATE in "${SEARCH_PATHS[@]}"; do
          if [ -f "$CANDIDATE" ]; then
            CONFIG="$CANDIDATE"
            break
          fi
        done

        # Fallback: recursively search bazel-bin for any .config
        if [ -z "$CONFIG" ]; then
          CONFIG=$(find "${{ github.workspace }}/kernel/bazel-bin" -name '.config' -path '*/kernel_*/*' 2>/dev/null | head -1)
        fi

        if [ -z "$CONFIG" ]; then
          echo "❌ Could not find generated .config in any expected location!"
          echo "   Searched:"
          for p in "${SEARCH_PATHS[@]}"; do echo "     - $p"; done
          echo "     - ${{ github.workspace }}/kernel/bazel-bin/**/kernel_*/.config (recursive)"
          echo ""
          echo "   Without .config verification, missing container configs will not be caught."
          echo "   The kernel may lack CGROUP_DEVICE, CGROUP_PIDS, or other required options."
          echo "::error::Kernel config verification failed — .config not found"
          exit 1
        fi

        echo "Verifying config: $CONFIG"
        FAILED=false

        for OPT in "${REQUIRED_OPTIONS[@]}"; do
          NAME="${OPT%%=*}"
          VALUE="${OPT#*=}"

          if grep -q "^${NAME}=${VALUE}" "$CONFIG" 2>/dev/null; then
            echo "  ✅ ${OPT}"
          elif grep -q "^${NAME}=m" "$CONFIG" 2>/dev/null; then
            echo "  ⚠ ${NAME}=m  (expected =y, módulo is acceptable)"
          else
            RAW=$(grep "^${NAME}=" "$CONFIG" 2>/dev/null || grep "^# ${NAME} is not set" "$CONFIG" 2>/dev/null || echo "NOT FOUND")
            echo "  ❌ ${OPT}  — current: ${RAW}"
            FAILED=true
          fi
        done

        if [ "$FAILED" = "true" ]; then
          echo ""
          echo "❌ One or more required kernel configs are missing!"
          echo "   The built kernel may not support Droidspaces containers."
          echo "   Check the config fragment at: ${{ github.workspace }}/wild_gki.fragment"
          echo "   Or check Kconfig existence in the kernel source."
          exit 1
        else
          echo ""
          echo "✅ All required kernel configs are present"
        fi