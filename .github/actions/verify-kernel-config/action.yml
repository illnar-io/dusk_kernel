name: 'Verify Kernel Config'
description: 'Check generated .config for required options'
inputs:
  kernel_version:
    description: 'Kernel version (e.g., 5.10)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Verify Droidspaces and container configs
      shell: bash
      run: |
        set -euo pipefail

        REQUIRED_OPTIONS=(
          "CONFIG_SYSVIPC=y"
          "CONFIG_POSIX_MQUEUE=y"
          "CONFIG_DEVTMPFS=y"
          "CONFIG_UTS_NS=y"
          "CONFIG_CGROUP_DEVICE=y"
          "CONFIG_CGROUP_PIDS=y"
          "CONFIG_MEMCG=y"
          "CONFIG_CGROUP_SCHED=y"
          "CONFIG_CGROUP_FREEZER=y"
          "CONFIG_CGROUP_CPUACCT=y"
          "CONFIG_USER_NS=y"
          "CONFIG_OVERLAY_FS=y"
          "CONFIG_NET_NS=y"
          "CONFIG_VETH=y"
          "CONFIG_KSU=y"
        )

        # These namespaces are not supported on kernel 5.10 (header stubs
        # conflict with real implementations, same pattern as CONFIG_USER_NS).
        if [ "${{ inputs.kernel_version }}" != "5.10" ]; then
          REQUIRED_OPTIONS+=("CONFIG_IPC_NS=y" "CONFIG_PID_NS=y")
        fi

        # NTSYNC is only expected when the backport was successfully applied.
        if [ "${NTSYNC_CONFIGURED:-false}" = "true" ]; then
          REQUIRED_OPTIONS+=("CONFIG_NTSYNC=y")
        fi

        # Bazel builds generate .config inside its sandbox — inaccessible after
        # build.  Instead, verify the fragment file we feed into the build.
        # The fragment is the source of truth for what we add on top of the
        # stock GKI defconfig.  If a required option is missing here, the
        # built kernel will lack it.
        FRAGMENT="${{ github.workspace }}/wild_gki.fragment"

        if [ ! -f "$FRAGMENT" ]; then
          echo "::error::wild_gki.fragment not found at $FRAGMENT"
          exit 1
        fi

        echo "Verifying fragment: $FRAGMENT"
        echo "Fragment contents ($(wc -l < "$FRAGMENT") lines):"
        grep '^CONFIG_' "$FRAGMENT" | sed 's/^/  /'
        echo ""

        FAILED=false

        for OPT in "${REQUIRED_OPTIONS[@]}"; do
          NAME="${OPT%%=*}"
          VALUE="${OPT#*=}"

          if grep -q "^${NAME}=${VALUE}" "$FRAGMENT" 2>/dev/null; then
            echo "  ✅ ${OPT}"
          elif grep -q "^${NAME}=m" "$FRAGMENT" 2>/dev/null; then
            echo "  ⚠ ${NAME}=m  (expected =y, module is acceptable)"
          else
            echo "  ❌ ${OPT}  — MISSING from fragment"
            FAILED=true
          fi
        done

        if [ "$FAILED" = "true" ]; then
          echo ""
          echo "❌ One or more required kernel configs are missing from wild_gki.fragment!"
          echo "   The built kernel will not support Droidspaces containers."
          echo "   Add the missing options to .github/actions/misc/action.yml or"
          echo "   .github/actions/droidspaces/action.yml fragment blocks."
          exit 1
        else
          echo ""
          echo "✅ All required container configs present in fragment"
          echo "   (on-device verification recommended after flash)"
        fi