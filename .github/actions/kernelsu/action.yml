name: Setup Root Solution
description: Download and configure the selected root solution (KernelSU-Next, SukiSU-Ultra, ReSukiSU)
inputs:
  root:
    description: "Root solution to install (KernelSU-Next, SukiSU-Ultra, ReSukiSU)"
    required: true

runs:
  using: composite
  steps:
    - name: Install Root Solution
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        ROOT="${{ inputs.root }}"
        echo "→ Installing root solution: ${ROOT}"

        if [[ "$ROOT" == "KernelSU-Next" ]] || [[ "$ROOT" == "KSUN" ]]; then
          echo "  Cloning KernelSU-Next..."
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/dev/kernel/setup.sh" | bash -s "5a4a71874caaad06aa126f761c93391de1d32361"
          # Pin to known-good dev commit — matches WildKernels' ksun patch.
          cd KernelSU-Next && git checkout 5a4a71874caaad06aa126f761c93391de1d32361 && cd kernel
          COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
          BASE_VERSION=30000
          KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
          sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild
          KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
          sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild
        elif [[ "$ROOT" == "SukiSU-Ultra" ]] || [[ "$ROOT" == "SKSU" ]]; then
          echo "  Cloning SukiSU-Ultra..."
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/setup.sh" | bash -s builtin
          cd KernelSU/kernel
          COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD 2>/dev/null || echo "0")
          BASE_VERSION=30000
          KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
          if [ -f "Kbuild" ]; then
            sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild
            KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
            sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild
          else
            echo "  ⚠ Kbuild not found (builtin branch), skipping version tagging"
          fi
          KSU_GIT_TAG="${KSU_GIT_TAG:-$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.1')}"
        elif [[ "$ROOT" == "ReSukiSU" ]] || [[ "$ROOT" == "RSKSU" ]]; then
          echo "  Cloning ReSukiSU..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
          cd KernelSU/kernel
          COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD 2>/dev/null || echo "0")
          BASE_VERSION=30000
          KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
          if [ -f "Kbuild" ]; then
            sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild
            KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
            sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild
          else
            echo "  ⚠ Kbuild not found, skipping version tagging"
          fi
          KSU_GIT_TAG="${KSU_GIT_TAG:-$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.1')}"
        else
          echo "::error::Unknown root solution: ${ROOT}"
          exit 1
        fi

        # Save KSU directory name for later steps
        if [[ "$ROOT" == "KernelSU-Next" ]] || [[ "$ROOT" == "KSUN" ]]; then
          echo "KSU_DIR=KernelSU-Next" >> $GITHUB_ENV
        else
          echo "KSU_DIR=KernelSU" >> $GITHUB_ENV
        fi

    - name: Enable KernelSU Config
      shell: bash
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # KernelSU Configuration
        CONFIG_KSU=y
        EOF

    - name: Extract Root Version Info
      shell: bash
      run: |
        set -euo pipefail
        KSU_DIR="${KSU_DIR:-KernelSU}"
        # Some forks (SukiSU-Ultra) clone to workspace root, others to kernel/
        KSU_PATH="${{ github.workspace }}/kernel/${KSU_DIR}"
        if [ ! -d "$KSU_PATH" ]; then
          KSU_PATH="${{ github.workspace }}/${KSU_DIR}"
        fi
        if [ -d "$KSU_PATH" ]; then
          cd "$KSU_PATH"
          KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")
          KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          KSU_VERSION=$((30000 + KSU_GIT_VERSION))
          echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
        else
          echo "⚠ KSU directory not found in kernel/ or workspace root: ${KSU_DIR}"
        fi

    - name: 'Fix KernelSU-Next SELinux declarations'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU-Next
      run: |
        set -euo pipefail
        ROOT="${{ inputs.root }}"
        if [[ "$ROOT" != "KernelSU-Next" && "$ROOT" != "KSUN" ]]; then
          echo "Skipping — not KernelSU-Next"
          exit 0
        fi
        cp ${{ github.action_path }}/patches/static.patch "${{ github.workspace }}/kernel/KernelSU-Next/static.patch"
        patch -p1 < static.patch
