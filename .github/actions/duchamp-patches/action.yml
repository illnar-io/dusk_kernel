name: "Apply Duchamp Performance & Battery Patches"
description: "Download and apply performance, battery, and networking patches from GKI-Duchamp"
inputs:
  kernel_version:
    description: "Kernel version (e.g., 6.1)"
    required: true
  sublevel:
    description: "Kernel sublevel number"
    required: true

runs:
  using: "composite"
  steps:
    - name: Apply Selective Patches (force_tcp_nodelay + F2FS GC) — Pixel 6 skip
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail

        if [ "${{ inputs.kernel_version }}" = "6.1" ]; then
          echo "Skipping Duchamp F2FS patches for kernel 6.1 (Pixel 6)."
          echo "F2FS GC tuning (reduce_gc_thread_sleep, enlarge_min_fsync_blocks,"
          echo "reduce_congestion) causes I/O stalls during container creation,"
          echo "triggering watchdog reboot. WildKernels upstream works without them."
        else
          BASE_URL="https://raw.githubusercontent.com/ahmed-alnassif/GKI-Duchamp/master/kernel-patches/common"
          PATCHES=(
            "reduce_gc_thread_sleep_time.patch"
            "f2fs_enlarge_min_fsync_blocks.patch"
            "f2fs_reduce_congestion.patch"
          )
          TMPDIR=$(mktemp -d)
          for PATCH in "${PATCHES[@]}"; do
            echo "→ Downloading ${PATCH}..."
            if ! curl -sLf "${BASE_URL}/${PATCH}" -o "${TMPDIR}/${PATCH}"; then
              echo "⚠ Failed to download ${PATCH}, skipping"
              continue
            fi
            echo "  Applying..."
            if ! patch -p1 --dry-run < "${TMPDIR}/${PATCH}" 2>/dev/null; then
              echo "  ⚠ ${PATCH} already applied upstream, skipping"
            else
              patch -p1 < "${TMPDIR}/${PATCH}"
              echo "  ✅ Applied"
            fi
          done
          rm -rf "$TMPDIR"
        fi

    - name: Skip Remaining Duchamp Patches
      shell: bash
      run: |
        echo "⚠ Other Duchamp patches skipped (reduce_cache_pressure, mem_opt_prefetch,"
        echo "  IPv6_NAT_FIX, battery/power, scheduler, logspam, etc.) — caused ZRAM"
        echo "  thrashing and instability on Pixel 6. Only F2FS GC tuning retained."
        echo "  force_tcp_nodelay removed: broke HTTP downloads (Telegram files)."

    - name: Download and Apply Scaling Min Freq Patches
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail
        echo "⚠ Skipping scaling_min_freq patches (GKI doesn't have cpu_lp_mask/cpu_perf_mask)"

    - name: Skip BBRv3
      shell: bash
      run: |
        echo "⚠ BBRv3 patch skipped (Duchamp source)"

    - name: Skip KernelSU Multi-Manager Patch
      shell: bash
      run: |
        echo "⚠ KernelSU Multi-Manager patch skipped (Duchamp source)"
