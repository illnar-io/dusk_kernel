name: "Apply Duchamp Performance & Battery Patches"
description: "Download and apply performance, battery, and networking patches from GKI-Duchamp"
inputs:
  kernel_version:
    description: "Kernel version (e.g., 6.1)"
    required: true
  sublevel:
    description: "Kernel sublevel number"
    required: true

runs:
  using: "composite"
  steps:
    - name: Skip Duchamp Patches
      shell: bash
      run: |
        echo "⚠ All Duchamp performance/battery/networking patches skipped."
        echo "  These patches (reduce_cache_pressure, mem_opt_prefetch, force_tcp_nodelay,"
        echo "  f2fs GC tuning, IPv6_NAT_FIX, etc.) caused ZRAM thrashing, app crashes,"
        echo "  and image loading failures on Pixel 6. Removed per user request."

    - name: Download and Apply Scaling Min Freq Patches
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail
        # Scaling min freq patches reference Samsung/OnePlus-specific
        # cpu_lp_mask/cpu_perf_mask not present in GKI common kernels.
        echo "⚠ Skipping scaling_min_freq patches (GKI doesn't have cpu_lp_mask/cpu_perf_mask)"

    - name: Skip BBRv3
      shell: bash
      run: |
        echo "⚠ BBRv3 patch skipped (Duchamp source)"

    - name: Skip KernelSU Multi-Manager Patch
      shell: bash
      run: |
        echo "⚠ KernelSU Multi-Manager patch skipped (Duchamp source)"
