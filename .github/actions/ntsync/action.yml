name: "Setup NTSYNC"
description: "Apply Windows NT sync driver backport from upstream for GKI kernels"
inputs:
  kernel_version:
    description: "Kernel version (e.g., 6.1)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Check if ntsync is already in tree
      id: check
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        if [ -f "drivers/misc/ntsync.c" ]; then
          echo "ntsync already present in kernel source"
          echo "in_tree=true" >> "$GITHUB_OUTPUT"
        else
          echo "ntsync not found, will apply backport"
          echo "in_tree=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Apply ntsync driver backport
      if: steps.check.outputs.in_tree == 'false'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail

        # ntsync uses lockdep_assert / LOCK_STATE_NOT_HELD which don't
        # exist on 5.10.  Skip entirely on this kernel version.
        if [ "${{ inputs.kernel_version }}" = "5.10" ]; then
          echo "⚠ ntsync requires lockdep_assert (6.4+), skipping on 5.10"
          exit 0
        fi

        PATCH="${{ github.workspace }}/kernel_patches/ntsync/ntsync_base.patch"
        echo "Applying ntsync patches from: ${PATCH}"

        if ! patch -p1 --dry-run < "$PATCH" 2>/dev/null; then
          echo "⚠ ntsync_base.patch doesn't apply (kernel version mismatch), skipping"
          exit 0
        fi

        patch -p1 < "$PATCH"
        echo "✅ Applied ntsync_base.patch"

        # Verify files were created
        if [ ! -s "drivers/misc/ntsync.c" ]; then
          echo "⚠ ntsync.c not created, trying compat layer"
        fi
        if [ ! -s "include/uapi/linux/ntsync.h" ]; then
          echo "⚠ ntsync.h not created, trying compat layer"
        fi

    - name: Apply ntsync compat layer (fallback for mismatched kernels)
      if: steps.check.outputs.in_tree == 'false'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail
        VERSION="${{ inputs.kernel_version }}"
        PATCH_SPECIFIC="${{ github.workspace }}/kernel_patches/ntsync/ntsync_compat_${VERSION}.patch"
        PATCH_GENERIC="${{ github.workspace }}/kernel_patches/ntsync/ntsync_compat.patch"
        if [ -f "$PATCH_SPECIFIC" ]; then
          PATCH="$PATCH_SPECIFIC"
        elif [ -f "$PATCH_GENERIC" ]; then
          PATCH="$PATCH_GENERIC"
        else
          echo "No compat patch found for ${VERSION}, skipping"
          exit 0
        fi
        if ! patch -p1 --dry-run < "$PATCH" 2>/dev/null; then
          echo "⚠ $(basename $PATCH) doesn't apply, skipping"
          exit 0
        fi
        patch -p1 < "$PATCH"
        echo "✅ Applied $(basename $PATCH)"

    - name: Configure NTSYNC in Kconfig and Makefile
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail

        # Only configure if ntsync files exist
        if [ ! -f "drivers/misc/ntsync.c" ]; then
          echo "⚠ ntsync.c not found, skipping Kconfig/Makefile setup"
          exit 0
        fi

        # Check if NTSYNC Kconfig already exists anywhere in the tree.
        # On newer kernels (e.g. a16-6.12) ntsync is in-tree with its own
        # Kconfig in a different file; adding a duplicate entry would break
        # kernel config generation.
        if grep -rq "config NTSYNC\b" --include="Kconfig" . 2>/dev/null; then
          echo "NTSYNC Kconfig already present in tree, skipping Kconfig/Makefile setup"
          exit 0
        fi

        # Add NTSYNC config to drivers/misc/Kconfig
        printf '\nconfig NTSYNC\n\ttristate "NT synchronization primitive emulation"\n\tdefault m\n\thelp\n\t  This module provides kernel support for emulation of Windows NT\n\t  synchronization primitives. It is not a hardware driver.\n\n\t  To compile this driver as a module, choose M here: the\n\t  module will be called ntsync.\n\n\t  If unsure, say N.\n' >> drivers/misc/Kconfig
        echo "Added NTSYNC config to Kconfig"

        # Add NTSYNC entry to drivers/misc/Makefile if not present
        if ! grep -q 'obj-$(CONFIG_NTSYNC)' drivers/misc/Makefile; then
          printf '\nobj-$(CONFIG_NTSYNC)\t+= ntsync.o\n' >> drivers/misc/Makefile
          echo "Added NTSYNC entry to Makefile"
        else
          echo "NTSYNC entry already present in Makefile"
        fi

    - name: Add ntsync module to BUILD.bazel module_outs
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail
        if [ ! -f "BUILD.bazel" ]; then
          echo "⚠ BUILD.bazel not found, skipping module_outs setup"
          exit 0
        fi
        if grep -q 'drivers/misc/ntsync.ko' BUILD.bazel 2>/dev/null; then
          echo "ntsync.ko already in module_outs"
          exit 0
        fi
        if ! grep -q 'module_outs' BUILD.bazel 2>/dev/null; then
          echo "⚠ module_outs not found in BUILD.bazel, skipping"
          exit 0
        fi
        perl -i -pe 's/(module_outs\s*=\s*\[)/$1\n        "drivers\/misc\/ntsync.ko",/' BUILD.bazel
        echo "✅ Added drivers/misc/ntsync.ko to module_outs"

    - name: Enable NTSYNC config
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        KERNEL_COMMON="${{ github.workspace }}/kernel/common"
        FRAGMENT="${{ github.workspace }}/wild_gki.fragment"
        if grep -rq "config NTSYNC\b" "$KERNEL_COMMON" 2>/dev/null; then
          echo '# NTSYNC - Windows NT sync primitives for Wine/Droidspaces' >> "$FRAGMENT"
          echo 'CONFIG_NTSYNC=y' >> "$FRAGMENT"
          echo "NTSYNC_CONFIGURED=true" >> "$GITHUB_ENV"
        else
          echo "⚠ CONFIG_NTSYNC Kconfig not found in kernel tree, skipping" >&2
          echo "NTSYNC_CONFIGURED=false" >> "$GITHUB_ENV"
        fi
