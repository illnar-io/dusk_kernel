name: Setup Droidspaces-OSS
description: Apply Droidspaces kABI fixes and configs from local patches
inputs:
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true

runs:
  using: composite
  steps:
    - name: Apply the SYSVIPC kABI fix (local patches)
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail
        
        if [ "${{ inputs.kernel_version }}" = "6.12" ]; then
          PATCH_FILE="${{ github.workspace }}/kernel_patches/droidspaces/fix_sysvipc_kabi_a16-6.12.patch"
        else
          PATCH_FILE="${{ github.workspace }}/kernel_patches/droidspaces/fix_sysvipc_kabi_6_7_8.patch"
        fi
        
        echo "Applying kABI fix from: $PATCH_FILE"
        if patch -p1 --dry-run < "$PATCH_FILE" 2>/dev/null; then
          patch -p1 < "$PATCH_FILE"
          echo "Applied SYSVIPC kABI fix from local patch"
        else
          echo "⚠ SYSVIPC kABI fix doesn't apply on this kernel version, skipping" >&2
        fi

    - name: Export IPC symbols for module linkage
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail
        # Only add EXPORT_SYMBOL_GPL if the symbol is not already exported in
        # the same file, which avoids duplicate-export redefinition errors that
        # break the build on kernels (5.10, 5.15, 6.1) where these symbols are
        # already exported in-tree.
        NAMESPACE_FILE="${{ github.workspace }}/kernel/common/ipc/namespace.c"
        MSGUTIL_FILE="${{ github.workspace }}/kernel/common/ipc/msgutil.c"
        if ! grep -q 'EXPORT_SYMBOL_GPL(put_ipc_ns)' "$NAMESPACE_FILE" 2>/dev/null; then
          echo "Adding EXPORT_SYMBOL_GPL(put_ipc_ns) to ipc/namespace.c"
          echo >> "$NAMESPACE_FILE"
          echo 'EXPORT_SYMBOL_GPL(put_ipc_ns);' >> "$NAMESPACE_FILE"
        else
          echo "put_ipc_ns already exported in ipc/namespace.c, skipping"
        fi
        if ! grep -q 'EXPORT_SYMBOL_GPL(init_ipc_ns)' "$MSGUTIL_FILE" 2>/dev/null; then
          echo "Adding EXPORT_SYMBOL_GPL(init_ipc_ns) to ipc/msgutil.c"
          echo >> "$MSGUTIL_FILE"
          echo 'EXPORT_SYMBOL_GPL(init_ipc_ns);' >> "$MSGUTIL_FILE"
        else
          echo "init_ipc_ns already exported in ipc/msgutil.c, skipping"
        fi

    - name: Enable Configs
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        FRAGMENT="${{ github.workspace }}/wild_gki.fragment"
        cat >> "$FRAGMENT" << 'EOF'
        # Kernel configurations for full DroidSpaces support for GKI
        # Copyright (C) 2026 ravindu644 <droidcasts@protonmail.com>

        # IPC
        CONFIG_SYSVIPC=y
        CONFIG_POSIX_MQUEUE=y

        # HW Access Support
        CONFIG_DEVTMPFS=y
        EOF

        # Ensure IPC_NS and PID_NS are in the fragment for 6.1+ (where the
        # fragment is properly applied).  5.10 handles these directly in
        # gki_defconfig above.
        echo 'CONFIG_IPC_NS=y' >> "$FRAGMENT"
        echo 'CONFIG_PID_NS=y' >> "$FRAGMENT"

        # Legacy build.sh (5.10) sources the fragment as a shell script, so
        # fragment options never reach .config.  Force the needed symbols
        # directly into gki_defconfig.  check_defconfig will be satisfied
        # because SYSVIPC has no Kconfig default (defaults n), so
        # savedefconfig keeps it — no diff with gki_defconfig.
        if [ "${{ inputs.kernel_version }}" = "5.10" ]; then
          DEFCONFIG="${{ github.workspace }}/kernel/common/arch/arm64/configs/gki_defconfig"
          if [ -f "$DEFCONFIG" ]; then
            # Remove stale n-setting for PID_NS.  PID_NS defaults to y via
            # NAMESPACES=y on this kernel; the n-setting overrides that and
            # must be removed.
            sed -i '/# CONFIG_PID_NS is not set/d' "$DEFCONFIG"
            echo "  ✓ removed stale # CONFIG_PID_NS is not set from gki_defconfig"

            # Add SYSVIPC so IPC_NS dependency (SYSVIPC || POSIX_MQUEUE)
            # is satisfied.  IPC_NS and PID_NS then default to y by Kconfig.
            if grep -q "^CONFIG_SYSVIPC=" "$DEFCONFIG"; then
              sed -i 's/^#\?CONFIG_SYSVIPC[ =].*/CONFIG_SYSVIPC=y/' "$DEFCONFIG"
            else
              echo "CONFIG_SYSVIPC=y" >> "$DEFCONFIG"
            fi
            echo "  ✓ CONFIG_SYSVIPC=y added to gki_defconfig"

            # Re-sort via savedefconfig so check_defconfig is satisfied.
            cd "${{ github.workspace }}/kernel/common"
            mkdir -p /tmp/droidspaces_sort
            if make ARCH=arm64 O=/tmp/droidspaces_sort gki_defconfig savedefconfig &>/dev/null && [ -f /tmp/droidspaces_sort/defconfig ]; then
              cp /tmp/droidspaces_sort/defconfig arch/arm64/configs/gki_defconfig
              echo "  ✓ gki_defconfig re-sorted with savedefconfig"
            fi
            rm -rf /tmp/droidspaces_sort
            cd "${{ github.workspace }}/kernel"
          fi
        fi
