name: "Apply External Source Patches"
description: "Apply curated patches from guacamole_sickness and Kirisakura_Raviole"
inputs:
  kernel_version:
    description: "Kernel version (e.g., 6.1)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Apply PCIe/SoC exynos patches (guacamole_sickness)
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail
        PATCH_DIR="${{ github.workspace }}/kernel_patches/external_sources"

        # Patches confirmed to cause watchdog reboot when Droidspaces creates a
        # container on Pixel 6 (Tensor GS101). The kernel panics in the WiFi driver
        # (bcmdhd4389, connected via PCIe) with a page fault on MMIO access:
        #   KP: Oops: comm:systemd-network PC:dhd_ioctl_entry_local+0x4c
        #   nl80211_dump_station -> ... -> dhd_ioctl_entry_local -> page fault
        #
        # Confirmed culprits:
        #   582e4e78f0ec — PCIe dwc-whi Zuma import (EXTREME, 2912-line G3->G1)
        #   f0d922fbfa9a — Clocksource MCT priority (HIGH, breaks deep idle wakeup)
        #   fc0ffe7473d5 — PCIe no-clock reg access (HIGH, register reads hang bus)
        #   67fe1061b2c2 — PCIe L1SS memoize (confirmed: broken L1 power state
        #                   transitions make WiFi BAR inaccessible -> page fault)
        # The other 3 PCIe patches (IRQ wake, MSI affinity, logspam) are safe
        # for runtime use and kept.
        SKIP_PATCHES=(
          "582e4e78f0ec"
          "f0d922fbfa9a"
          "fc0ffe7473d5"
          "67fe1061b2c2"
        )

        for PATCH in $(ls "$PATCH_DIR"/*pcie*exynos*.patch "$PATCH_DIR"/*pcie*dwc-whi*.patch \
                             "$PATCH_DIR"/*exynos*.patch "$PATCH_DIR"/*smfc*.patch \
                             "$PATCH_DIR"/*GCMA*.patch "$PATCH_DIR"/*clocksource*.patch 2>/dev/null | sort -V || true); do
          PATCH_BASENAME=$(basename "$PATCH")

          SKIP=false
          for SKIP_PREFIX in "${SKIP_PATCHES[@]}"; do
            if [[ "$PATCH_BASENAME" == "${SKIP_PREFIX}"* ]]; then
              echo "→ SKIPPING: $PATCH_BASENAME (causes container watchdog reboot on Pixel 6)"
              SKIP=true
              break
            fi
          done
          $SKIP && continue

          echo "→ Applying: $PATCH_BASENAME"
          if patch -p1 --dry-run < "$PATCH" 2>/dev/null; then
            patch -p1 < "$PATCH"
            echo "  ✅ $PATCH_BASENAME applied."
          else
            echo "  ⚠ $PATCH_BASENAME incompatible or already applied, skipping"
          fi
        done
