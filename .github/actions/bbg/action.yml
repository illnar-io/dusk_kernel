name: Setup Baseband Guard (BBG)
description: Download and configure Baseband Guard security module

runs:
  using: composite
  steps:
    - name: Install Baseband Guard
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash

    - name: Fix BBG genheaders linker
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        # BBG's Makefile compiles genheaders with $(HOSTCC) (clang).
        # Clang searches for 'ld' but the prebuilt LLVM toolchain only has
        # ld.lld.  Add -fuse-ld=lld so it uses ld.lld explicitly.
        MAKEFILE="security/baseband-guard/Makefile"
        if [ -f "$MAKEFILE" ] && ! grep -q "fuse-ld" "$MAKEFILE"; then
          sed -i '/\$(HOSTCC)/s/\$(HOSTCC)/$(HOSTCC) -fuse-ld=lld/' "$MAKEFILE"
          echo "✓ Patched BBG Makefile to use ld.lld for genheaders"
        elif [ -f "$MAKEFILE" ]; then
          echo "✓ BBG Makefile already patched for ld"
        else
          echo "⚠ BBG Makefile not found at $MAKEFILE" >&2
        fi
    
    - name: Configure Baseband Guard
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        FRAGMENT="${{ github.workspace }}/wild_gki.fragment"
        if grep -Rq "config BBG\b" common 2>/dev/null; then
          echo "CONFIG_BBG=y" >> "$FRAGMENT"
          DEFCONFIG="${{ github.workspace }}/kernel/common/arch/arm64/configs/gki_defconfig"
          if grep -q "^CONFIG_LSM=" "$DEFCONFIG" 2>/dev/null; then
            CURRENT_LSM=$(grep "^CONFIG_LSM=" "$DEFCONFIG" | cut -d= -f2 | tr -d '"')
            LSM_VALUE="${CURRENT_LSM},baseband_guard"
          else
            LSM_VALUE="landlock,lockdown,yama,loadpin,safesetid,integrity,selinux,smack,tomoyo,apparmor,bpf,baseband_guard"
          fi
          echo "CONFIG_LSM=\"${LSM_VALUE}\"" >> "$FRAGMENT"
          # Legacy build.sh (5.10, 5.15): merge_config.sh -m does NOT override
          # existing values, so the fragment's CONFIG_LSM is ignored.
          # Patch gki_defconfig directly for the legacy path, then run
          # savedefconfig so that check_defconfig finds an exact match
          # (savedefconfig sorts entries alphabetically).
          if [ ! -f "tools/bazel" ]; then
            echo "  → Legacy build system detected, patching gki_defconfig directly."
            if grep -q "^CONFIG_LSM=" "$DEFCONFIG"; then
              sed -i "s|^CONFIG_LSM=.*|CONFIG_LSM=\"${LSM_VALUE}\"|" "$DEFCONFIG"
            else
              echo "CONFIG_LSM=\"${LSM_VALUE}\"" >> "$DEFCONFIG"
            fi
            cd common || exit 1
            mkdir -p /tmp/bbg_sort
            if make ARCH=arm64 O=/tmp/bbg_sort gki_defconfig savedefconfig &>/dev/null && [ -f /tmp/bbg_sort/defconfig ]; then
              cp /tmp/bbg_sort/defconfig arch/arm64/configs/gki_defconfig
              echo "  ✓ gki_defconfig sorted with savedefconfig"
            else
              echo "  ⚠ savedefconfig sorting failed, check_defconfig may fail during build" >&2
            fi
            cd ..
            echo "  ✓ gki_defconfig updated with baseband_guard"
          fi
          echo "✓ BBG configured (CONFIG_BBG=y + baseband_guard in CONFIG_LSM)"
        else
          echo "⚠ BBG Kconfig not found in kernel tree, skipping" >&2
        fi
    
    - name: Extract BBG Version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/Baseband-guard
      run: |
        # Extract and export BBG version info
        BBG_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        echo "BBG_COMMIT=$BBG_COMMIT" >> $GITHUB_ENV
