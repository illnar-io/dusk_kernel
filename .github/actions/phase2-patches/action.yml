name: Apply Phase 2 Patches
description: "Apply Phase 2 DUSK Report patches: ZRAM multi-compression backport and other performance/security patches"
inputs:
  kernel_version:
    description: "Kernel version (e.g., 6.1)"
    required: true
  android_version:
    description: "Android version (e.g., android14)"
    required: true
  sublevel:
    description: "Kernel sublevel number"
    required: true
runs:
  using: composite
  steps:
    - name: Apply Ptrace Leak Fix
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail
        PATCH_DIR="${{ github.workspace }}/kernel_patches/ptrace"
        if [ ! -d "$PATCH_DIR" ]; then
          echo "::warning::Ptrace patch directory not found: $PATCH_DIR"
          exit 0
        fi
        for PATCH in $(ls "$PATCH_DIR"/*.patch | sort -V); do
          echo "Applying patch: $(basename "$PATCH")"
          if patch -p1 --dry-run < "$PATCH" 2>/dev/null; then
            patch -p1 < "$PATCH"
            echo "✅ $(basename "$PATCH") applied."
          else
            echo "⚠ $(basename "$PATCH") incompatible or already applied, skipping"
          fi
        done

    - name: Apply Unicode Bypass Fix
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail
        PATCH_DIR="${{ github.workspace }}/kernel_patches/unicode"
        if [ ! -d "$PATCH_DIR" ]; then
          echo "::warning::Unicode bypass patch directory not found: $PATCH_DIR"
          exit 0
        fi
        for PATCH in $(ls "$PATCH_DIR"/*.patch | sort -V); do
          echo "Applying patch: $(basename "$PATCH")"
          if patch -p1 --dry-run < "$PATCH" 2>/dev/null; then
            patch -p1 < "$PATCH"
            echo "✅ $(basename "$PATCH") applied."
          else
            echo "⚠ $(basename "$PATCH") incompatible or already applied, skipping"
          fi
        done

    - name: Apply F2FS Checkpoint RT Priority Patch
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail
        PATCH_DIR="${{ github.workspace }}/kernel_patches/f2fs"
        if [ ! -d "$PATCH_DIR" ]; then
          echo "::warning::F2FS patch directory not found: $PATCH_DIR"
          exit 0
        fi
        for PATCH in $(ls "$PATCH_DIR"/*.patch | sort -V); do
          echo "Applying patch: $(basename "$PATCH")"
          if patch -p1 --dry-run < "$PATCH" 2>/dev/null; then
            patch -p1 < "$PATCH"
            echo "✅ $(basename "$PATCH") applied."
          else
            echo "⚠ $(basename "$PATCH") incompatible or already applied, skipping"
          fi
        done

    - name: Apply ZRAM Multi-Compression Patches
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail
        # Skip ZRAM multi-compression patches for kernels that already have it built-in
        # GKI android14-5.15 and android14-6.1 have multi-compression via combs[] from the start
        if [[ "${{ inputs.android_version }}" == "android14" && "${{ inputs.kernel_version }}" == "6.1" ]] || \
           [[ "${{ inputs.kernel_version }}" == "6.6" ]] || \
           [[ "${{ inputs.kernel_version }}" == "6.12" ]] || \
           [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" ]] || \
           [[ "${{ inputs.android_version }}" == "android14" && "${{ inputs.kernel_version }}" == "5.15" ]] || \
           [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.10" ]]; then
          echo "⚠ Kernel ${{ inputs.kernel_version }}.${{ inputs.sublevel }} already has multi-compression support, skipping ZRAM patches"
          exit 0
        fi
        PATCH_DIR="${{ github.workspace }}/kernel_patches/zram_multi_comp"
        if [ ! -d "$PATCH_DIR" ]; then
          echo "::warning::ZRAM multi-compression patch directory not found: $PATCH_DIR"
          exit 0
        fi
        for PATCH in $(ls "$PATCH_DIR"/*.patch | sort -V); do
          echo "Applying patch: $(basename "$PATCH")"
          if patch -p1 --dry-run < "$PATCH" 2>/dev/null; then
            patch -p1 < "$PATCH"
            echo "✅ $(basename "$PATCH") applied."
          else
            echo "⚠ $(basename "$PATCH") incompatible or already applied, skipping"
          fi
        done
