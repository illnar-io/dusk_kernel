name: 'Build Kernel'
description: 'Builds kernel using legacy build.sh or Bazel (kleaf)'

runs:
  using: composite
  steps:
  - name: 'Build Kernel'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      set -euo pipefail
      if [ -f "build/build.sh" ]; then
        # BUILD_CONFIG and GKI_DEFCONFIG_FRAGMENT must be env vars (not
        # positional args) because build.sh sources _setup_env.sh before
        # processing KEY=VALUE arguments.
        export BUILD_CONFIG=common/build.config.gki.aarch64
        export GKI_DEFCONFIG_FRAGMENT="${{ github.workspace }}/wild_gki.fragment"
        # Also append GKI_DEFCONFIG_FRAGMENT to the BUILD_CONFIG file itself.
        # build.sh sources BUILD_CONFIG (a shell script) which may override our
        # exported env var with a built-in fragment path.  Appending at the end
        # ensures our fragment is the last value assigned.
        if [ -f "common/build.config.gki.aarch64" ]; then
          if ! grep -q "wild_gki.fragment" "common/build.config.gki.aarch64"; then
            echo "" >> "common/build.config.gki.aarch64"
            echo "# wild_gki.fragment (appended by dusk_kernel)" >> "common/build.config.gki.aarch64"
            echo "GKI_DEFCONFIG_FRAGMENT=\"${{ github.workspace }}/wild_gki.fragment\"" >> "common/build.config.gki.aarch64"
          fi
        fi
        MAKE_ARGS=(
          SKIP_VENDOR_BOOT=1
          SKIP_EXT_MODULES=1
          SKIP_CP_KERNEL_HDR=1
          SKIP_MRPROPER=1
          LTO=thin
        )
        for var in CC CXX HOSTCC HOSTCXX LD HOSTLD; do
          if [ -n "${!var:-}" ]; then
            MAKE_ARGS+=("$var=${!var}")
          fi
        done
        # On legacy builds (5.10, 5.15) the build system checks
        # common/android/gki_aarch64_modules against the actual module list
        # after compilation.  If our fragment adds extra modules (zram, ntsync,
        # zsmalloc) this check fails.  Update the file upfront so it reflects
        # what we will build.
        if [ -f "common/android/gki_aarch64_modules" ]; then
          for mod in mm/zsmalloc.ko drivers/block/zram/zram.ko drivers/misc/ntsync.ko; do
            if ! grep -qxF "$mod" "common/android/gki_aarch64_modules" 2>/dev/null; then
              echo "$mod" >> "common/android/gki_aarch64_modules"
            fi
          done
          echo "✓ Updated common/android/gki_aarch64_modules"
        fi

        # Use fewer parallel jobs than $(nproc) to avoid OOM during LTO.
        # GitHub runners have 4 vCPUs but LTO thin with -j4 can exhaust
        # memory on older kernel versions (5.15.41, 5.15.74) that lack
        # memory-efficient LTO improvements.  -j2 keeps memory safe.
        build/build.sh -j2 "${MAKE_ARGS[@]}"
      else
        cp "${{ github.workspace }}/wild_gki.fragment" common/arch/arm64/configs/wild_gki.fragment
        tools/bazel build \
          --linkopt="--thinlto-cache-dir=/home/runner/.ld_cache" \
          --config=fast \
          --defconfig_fragment=//common:arch/arm64/configs/wild_gki.fragment \
          --disk_cache="$BAZEL_CACHE_DIR" \
          //common:kernel_aarch64
      fi
