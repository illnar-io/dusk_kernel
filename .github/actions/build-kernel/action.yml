name: 'Build Kernel'
description: 'Builds kernel using legacy build.sh or Bazel (kleaf)'

runs:
  using: composite
  steps:
  - name: 'Build Kernel'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      set -euo pipefail
      if [ -f "build/build.sh" ]; then
        # build.config.gki.aarch64 sets CC/CXX/HOSTCC/HOSTCXX, so only
        # pass them through if already set in the environment to avoid
        # 'unbound variable' errors from set -u.
        MAKE_ARGS=(
          SKIP_VENDOR_BOOT=1
          SKIP_EXT_MODULES=1
          SKIP_CP_KERNEL_HDR=1
          SKIP_MRPROPER=1
          LTO=thin
          GKI_DEFCONFIG_FRAGMENT="${{ github.workspace }}/wild_gki.fragment"
          BUILD_CONFIG=common/build.config.gki.aarch64
        )
        for var in CC CXX HOSTCC HOSTCXX LD HOSTLD; do
          if [ -n "${!var:-}" ]; then
            MAKE_ARGS+=("$var=${!var}")
          fi
        done
        build/build.sh -j"$(nproc)" "${MAKE_ARGS[@]}"
      else
        cp "${{ github.workspace }}/wild_gki.fragment" common/arch/arm64/configs/wild_gki.fragment
        tools/bazel build \
          --linkopt="--thinlto-cache-dir=/home/runner/.ld_cache" \
          --config=fast \
          --defconfig_fragment=//common:arch/arm64/configs/wild_gki.fragment \
          --disk_cache="$BAZEL_CACHE_DIR" \
          //common:kernel_aarch64
      fi
