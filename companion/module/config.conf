# DUSK Companion Configuration
# Mode: balanced, performance, powersave, gaming
MODE=balanced

# Auto battery saver when screen off
AUTO_BATTERY_SAVER=true

# TCP congestion control (bbr, cubic, westwood)
TCP_CONG=bbr

# Enable TCP ECN
TCP_ECN=true

# Default I/O scheduler
IO_SCHEDULER=mq-deadline

# GPU governor (performance, simple_ondemand)
GPU_GOVERNOR=performance

# CPU governor (schedutil, performance, powersave)
CPU_GOVERNOR=schedutil

# ZRAM compression algorithm
ZRAM_ALGO=zstd

# Thermal throttling limit in millicelsius (90000 = 90°C)
THERMAL_LIMIT=90000

# ext4 commit interval in seconds
EXT4_COMMIT=30

# F2FS GC urgent sleep in ms
F2FS_GC_URGENT_SLEEP=50

# Log level (0=minimal, 1=normal, 2=verbose)
LOG_LEVEL=1
